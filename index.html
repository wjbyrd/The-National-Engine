{id:238,q:"A tax-transfer policy reduces inequality but also discourages work effort and shrinks total surplus. This is an example of...",options:["A Pareto improvement","An efficiency-equity tradeoff","A failure of monopoly regulation","A proof that fairness is impossible"],a:1,tag:"equity",type:"interpretation",objective:"LO 11.5 — Efficiency and equity",feedback:"Improving distribution can come at the cost of efficiency."},
{id:239,q:"An outcome is Pareto efficient, but one person holds nearly all resources. What can we conclude?",options:["The outcome must be socially desirable","The outcome is efficient, but society may still reject it on equity grounds","The outcome is inefficient because wealth is concentrated","The contract curve has been violated"],a:1,tag:"equity",type:"default",objective:"LO 11.5 — Efficiency and equity",feedback:"Efficiency answers one question. Fairness answers another."},
{id:240,q:"Two individuals trade until their MRS are equal. What does this guarantee?",options:["Equal income","Pareto efficiency","Maximum production","Perfect equality"],a:1,tag:"efficiency",type:"definition",objective:"LO 11.4 — Pareto efficiency",feedback:"No further gains from trade remain."},
{id:241,q:"An allocation is on the contract curve but highly unequal. What is true?",options:["It is inefficient","It is efficient but may be inequitable","It must be fair","Trade must stop"],a:1,tag:"equity",type:"trap",objective:"LO 11.5 — Efficiency and equity",feedback:"Efficiency does not imply fairness."},
{id:242,q:"A monopolist earns persistent profit because of patents and control of key resources. What is the source of power?",options:["Demand shifts","Barriers to entry","Efficiency","Elasticity"],a:1,tag:"power",type:"interpretation",objective:"LO 12.1 — Sources of monopoly power",feedback:"Barriers prevent competition."},
{id:243,q:"If barriers to entry suddenly disappear in a monopoly market, what happens in the long run?",options:["Prices rise","Prices fall and output increases","Demand disappears","Costs rise"],a:1,tag:"power",type:"multi-step",objective:"LO 12.1 — Sources of monopoly power",feedback:"Entry erodes market power."},
{id:244,q:"A monopolist charges P = MC and a fixed entry fee equal to consumer surplus. What is the result?",options:["Deadweight loss","Efficient output and full surplus extraction","Zero output","Perfect competition"],a:1,tag:"power",type:"trap",objective:"LO 12.4 — Monopoly pricing strategies",feedback:"Two-part tariff can achieve efficiency while capturing surplus."},
{id:245,q:"Why is a two-part tariff often more profitable than a single price monopoly?",options:["It reduces costs","It increases demand","It captures more consumer surplus","It eliminates competition"],a:2,tag:"power",type:"interpretation",objective:"LO 12.4 — Monopoly pricing strategies",feedback:"Firms extract surplus beyond per-unit pricing."},
{id:246,q:"A hamburger market is linked to the labor market for hamburger workers. If the price of a substitute good falls, reducing demand for hamburgers, what is the most likely chain of effects?",options:["Hamburger demand falls, hamburger output falls, and labor demand for hamburger workers falls","Hamburger supply rises, hamburger output rises, and labor demand rises","Hamburger demand rises because substitutes became cheaper","Only the labor market changes because product markets and labor markets are unrelated"],a:0,tag:"interaction",type:"multi-step",objective:"LO11.1",feedback:"A lower price for a substitute reduces demand for hamburgers. Lower hamburger demand reduces output, which also lowers demand for workers in that market."},
{id:247,q:"A market currently has excess demand at the posted price. A point on the graph shows a bundle traded before adjustment, but equilibrium occurs elsewhere. What should students identify as the efficient market outcome?",options:["The traded bundle because all trades are efficient","The equilibrium point where quantity demanded equals quantity supplied","The highest quantity shown on the graph","The point with the greatest consumer surplus only"],a:1,tag:"efficiency",type:"graph-interpretation",objective:"LO11.2",feedback:"A traded bundle during adjustment is not necessarily the final efficient outcome. Competitive equilibrium occurs where quantity demanded equals quantity supplied."},
{id:248,q:"In an Edgeworth Box, Johnny and Sunny are at a point where their indifference curves cross rather than touch. What does this imply?",options:["The allocation is Pareto efficient","There are still mutually beneficial trades available","The allocation must be equitable","Both individuals have identical preferences"],a:1,tag:"efficiency",type:"graph-interpretation",objective:"LO11.4",feedback:"When indifference curves cross, the allocation is not on the contract curve. There are still trades that can make at least one person better off without making the other worse off."},
{id:249,q:"An Edgeworth Box shows two possible final allocations. One is on the contract curve but gives one person much more than the other. What is the best interpretation?",options:["The allocation is inefficient because it is unequal","The allocation may be Pareto efficient even if it is inequitable","The allocation must be both fair and efficient","The allocation cannot occur after voluntary trade"],a:1,tag:"equity",type:"trap",objective:"LO11.5",feedback:"Pareto efficiency means no further mutually beneficial trade remains. It does not guarantee that the final allocation is fair or equal."},
{id:250,q:"Steve and Austin move from an inefficient allocation to a point on the contract curve that is also closer to an equitable division. What does this movement illustrate?",options:["A movement toward both efficiency and equity","A movement away from Pareto efficiency","A pure production efficiency improvement","A monopoly pricing strategy"],a:0,tag:"equity",type:"graph-interpretation",objective:"LO11.5",feedback:"Moving to the contract curve improves efficiency, and moving toward a more balanced allocation can also improve equity."},
{id:251,q:"A monopolist faces demand P = 120 - 2Q and total cost TC = 30Q + Q^2. What is the monopolist’s profit-maximizing quantity?",options:["10","15","20","30"],a:1,tag:"power",type:"calculation",objective:"LO12.2",feedback:"Total revenue is 120Q - 2Q^2, so MR = 120 - 4Q. Marginal cost is 30 + 2Q. Set MR = MC: 120 - 4Q = 30 + 2Q, so Q = 15."},
{id:252,q:"Using demand P = 120 - 2Q, if the monopolist produces Q = 15, what price does it charge?",options:["60","75","90","105"],a:2,tag:"power",type:"calculation",objective:"LO12.2",feedback:"Plug Q = 15 into demand: P = 120 - 2(15) = 90."},
{id:253,q:"A monopoly graph shows constant marginal cost and a single-price monopolist. Which area represents the efficiency loss from monopoly?",options:["The deadweight loss triangle from units not produced","The entire profit rectangle","Consumer surplus above price","The fixed cost area"],a:0,tag:"power",type:"graph-interpretation",objective:"LO12.3",feedback:"With single-price monopoly, the efficiency loss is the deadweight loss from output being restricted below the efficient level where willingness to pay equals marginal cost."},
{id:254,q:"A monopolist is not perfectly price discriminating and produces where MR = MC. Why is the outcome inefficient?",options:["The monopolist produces where P = MC","The monopolist produces too little because price exceeds marginal cost","The monopolist earns zero profit","The monopolist has no fixed costs"],a:1,tag:"power",type:"trap",objective:"LO12.3",feedback:"Single-price monopoly restricts output. At the monopoly quantity, price is greater than marginal cost, meaning some mutually beneficial trades do not occur."},
{id:255,q:"Two consumers value two products differently. Consumer 1 values A at 50 and B at 20. Consumer 2 values A at 20 and B at 50. If marginal cost is 10 per product, why can bundling raise profit?",options:["Both consumers value the bundle at 70, allowing the firm to sell more total surplus","Bundling lowers marginal cost to zero","Bundling works only when consumers have identical values for each product","Bundling forces price to equal marginal cost"],a:0,tag:"power",type:"multi-step",objective:"LO12.4",feedback:"Each consumer values the bundle at 70 even though their values for the individual products differ. Bundling lets the firm capture more surplus than pricing each product separately."},
{id:256,q:"A firm sells a bundle for 70 to two consumers. Each bundle contains two products, and marginal cost is 10 per product. What is total profit from selling the bundle to both consumers?",options:["40","70","100","140"],a:2,tag:"power",type:"calculation",objective:"LO12.4",feedback:"Revenue is 70 × 2 = 140. Each bundle costs 20 to provide, so total cost is 40. Profit is 140 - 40 = 100."},
{id:257,q:"A natural monopoly is regulated using marginal-cost pricing. At the efficient quantity, price is below average cost. What must happen for the firm to remain in business?",options:["The firm must receive a subsidy covering the loss","The firm will earn monopoly profit","The firm must reduce output below the efficient quantity","The firm must become perfectly competitive"],a:0,tag:"power",type:"graph-interpretation",objective:"LO12.5",feedback:"Marginal-cost pricing can produce the efficient quantity, but if price is below average cost, the firm needs a subsidy to cover its losses."},
{id:258,q:"Under average-cost pricing for a natural monopoly, which statement is correct?",options:["Price equals average cost, so the firm earns zero economic profit","Price equals marginal cost, so the firm earns monopoly profit","Price is set below average cost, so the firm exits immediately","Output is always perfectly efficient"],a:0,tag:"power",type:"interpretation",objective:"LO12.5",feedback:"Average-cost pricing allows the firm to cover total cost, including normal profit. That means economic profit is zero, though output may be below the fully efficient quantity."},
{id:259,q:"Two differentiated Bertrand firms have symmetric best-response functions. Firm 1’s best response is P1 = 35 + 0.25P2, and Firm 2’s best response is P2 = 35 + 0.25P1. What is the symmetric equilibrium price?",options:["20.00","33.33","46.67","60.00"],a:2,tag:"strategy",type:"calculation",objective:"LO13.2",feedback:"In a symmetric equilibrium, P1 = P2 = P. Substitute into the best response: P = 35 + 0.25P. Therefore 0.75P = 35, so P = 46.67."},
{id:260,q:"Why does differentiated Bertrand competition usually lead to prices above marginal cost?",options:["Products are not perfect substitutes, so each firm retains some market power","Firms are legally required to collude","Consumers always buy from the lowest-price firm only","Marginal cost is always zero"],a:0,tag:"strategy",type:"interpretation",objective:"LO13.2",feedback:"When products are differentiated, a firm does not lose the entire market from charging a slightly higher price. That softens price competition and allows price to remain above marginal cost."},
{id:261,q:"In a Cournot market with inverse demand P = 100 - Q and constant MC = 20, two identical firms compete in quantities. What is each firm’s equilibrium output?",options:["20.00","26.67","40.00","60.00"],a:1,tag:"strategy",type:"calculation",objective:"LO13.1",feedback:"For two identical Cournot firms, each firm produces (a - c)/(n + 1). Here that is (100 - 20)/3 = 26.67."},
{id:262,q:"In the same Cournot market with P = 100 - Q and MC = 20, if each firm produces 26.67, what is approximately each firm’s profit?",options:["400.00","533.33","711.11","1200.00"],a:2,tag:"strategy",type:"calculation",objective:"LO13.1",feedback:"Total output is about 53.33, so price is about 46.67. Each firm’s margin is 46.67 - 20 = 26.67. Profit is 26.67 × 26.67 = about 711.11."},
{id:263,q:"In a Stackelberg market with P = 100 - Q and MC = 20, the leader produces 40 and the follower produces 20. What is total industry profit?",options:["400","800","1,000","1,200"],a:3,tag:"strategy",type:"calculation",objective:"LO13.3",feedback:"Total output is 60, so price is 40. The margin is 40 - 20 = 20. Leader profit is 20 × 40 = 800, and follower profit is 20 × 20 = 400. Total industry profit is 1,200."},
{id:264,q:"Why does the Stackelberg leader usually earn more than the follower?",options:["The leader commits to output first and anticipates the follower’s response","The follower chooses price first","The leader must produce the same output as the follower","The follower always has lower marginal cost"],a:0,tag:"strategy",type:"interpretation",objective:"LO13.3",feedback:"The leader gains a strategic advantage by committing to output first and choosing quantity while anticipating how the follower will respond."},
{id:265,q:"A monopolistically competitive firm is shown in long-run equilibrium. Which statement must be true?",options:["The firm earns positive economic profit","The firm earns no economic profit because demand is tangent to average total cost","The firm produces where price equals marginal cost","The firm has no market power"],a:1,tag:"power",type:"graph-interpretation",objective:"LO12.6",feedback:"In long-run monopolistic competition, entry shifts demand until it is tangent to average total cost. The firm still has market power, but economic profit is zero."},
{id:266,q:"Refer to the monopoly graph above. How does the monopolist determine the profit-maximizing output?",options:["Produce where demand intersects average total cost","Produce where marginal revenue equals marginal cost","Produce where price equals average total cost","Produce where demand equals marginal revenue"],a:1,tag:"power",type:"graph",objective:"LO12.2",image:"monopoly12.2.png",feedback:"A monopolist maximizes profit by producing the quantity where marginal revenue equals marginal cost. After finding that quantity, the monopolist uses the demand curve to determine the price."},
{id:267,q:"Refer to the monopoly graph above. After the monopolist chooses the profit-maximizing quantity, how is the monopoly price found?",options:["Move up from the chosen quantity to the demand curve","Move up from the chosen quantity to the marginal revenue curve","Use the minimum point of average total cost","Use the point where marginal cost crosses average total cost"],a:0,tag:"power",type:"graph",objective:"LO12.2",image:"monopoly12.2.png",feedback:"The monopolist chooses output where MR = MC, then moves up to the demand curve to find the highest price consumers are willing to pay for that quantity."},
{id:268,q:"Refer to the monopoly graph above. Which comparison determines whether the monopolist earns positive economic profit at the chosen output?",options:["Price compared with marginal revenue","Price compared with average total cost","Marginal revenue compared with average total cost","Marginal cost compared with demand"],a:1,tag:"power",type:"graph",objective:"LO12.2",image:"monopoly12.2.png",feedback:"Profit depends on price compared with average total cost at the chosen output. If price is above ATC, the monopolist earns positive economic profit. If price is below ATC, the monopolist earns a loss."},
{id:269,q:"Refer to the Edgeworth Box above. What does the purple curve running through the tangency points represent?",options:["The set of Pareto efficient allocations","The set of equal income allocations","The budget constraint for both individuals","The set of inefficient trades"],a:0,tag:"efficiency",type:"graph",objective:"LO11.4",image:"Edgeworth11.4.png",feedback:"The purple curve represents the contract curve. Points on the contract curve are Pareto efficient because the two individuals’ indifference curves are tangent, meaning no further mutually beneficial trade remains."},
{id:270,q:"Refer to the Edgeworth Box above. If an allocation is away from the contract curve, what does that imply?",options:["The allocation must be equitable","The allocation is Pareto efficient","There may still be mutually beneficial trades available","Both individuals have identical preferences"],a:2,tag:"efficiency",type:"graph",objective:"LO11.4",image:"Edgeworth11.4.png",feedback:"An allocation away from the contract curve is not Pareto efficient. Because the individuals’ indifference curves are not tangent there, it may be possible to reallocate goods in a way that makes at least one person better off without making the other worse off."},
{id:271,q:"Refer to the Edgeworth Box above. Which statement best connects efficiency and equity in this graph?",options:["Every point on the contract curve is automatically equitable","A point can be Pareto efficient even if it is not viewed as equitable","Equity requires staying away from the contract curve","Pareto efficiency means both people receive identical bundles"],a:1,tag:"equity",type:"graph",objective:"LO11.5",image:"Edgeworth11.4.png",feedback:"The contract curve shows Pareto efficient allocations, but efficiency does not guarantee fairness. A point can be efficient because no further mutually beneficial trades remain, while still being judged inequitable depending on how the goods are distributed."},
{id:272,q:"Refer to the Edgeworth Box above. What does the shaded area around point A represent?",options:["Allocations that may make at least one person better off without making the other worse off","Allocations that are less efficient than point A for both people","Allocations that require both people to receive identical bundles","Allocations where production costs are minimized"],a:0,tag:"efficiency",type:"graph",objective:"LO11.4",image:"edgeworth11.2.png",feedback:"The shaded lens shows allocations that may be Pareto improvements from point A. These are trades that can make at least one person better off without making the other person worse off."},
{id:273,q:"Refer to the Edgeworth Box above. If point A lies inside the shaded lens of possible trades, what does that imply about the starting allocation?",options:["It is already Pareto efficient","It is not Pareto efficient because mutually beneficial trades may still exist","It is automatically equitable","It maximizes total production"],a:1,tag:"efficiency",type:"graph",objective:"LO11.4",image:"edgeworth11.2.png",feedback:"Point A is not Pareto efficient if there are nearby allocations that both people would weakly prefer and at least one person would strictly prefer. The shaded area shows that mutually beneficial trades may still exist."},
{id:274,q:"Refer to the Edgeworth Box above. Why would voluntary trade tend to move away from point A?",options:["Because both individuals may be able to reach higher indifference curves","Because the contract curve always requires equal bundles","Because one person must lose for the other to gain","Because point A minimizes production cost"],a:0,tag:"efficiency",type:"graph",objective:"LO11.4",image:"edgeworth11.2.png",feedback:"Voluntary trade can move away from point A when both individuals can reach preferred allocations. The shaded lens identifies possible gains from trade, where at least one person is better off and neither person is worse off."},
{id:275,q:"Refer to the graph above. Assume point B is the autarky equilibrium and BC1 is the world price line after trade opens. Which point represents the production point after trade?",options:["A","B","C","None, because production does not change with trade"],a:0,tag:"interaction",type:"graph",objective:"LO11.4",image:"trade11.2.png",feedback:"With trade, the economy produces where the world price line is tangent to the production possibilities frontier. That occurs at point A."},
{id:276,q:"Refer to the graph above. Assume point B is the autarky equilibrium and BC1 is the world price line after trade opens. Which point represents the consumption point after trade?",options:["A","B","C","None, because consumption must equal production"],a:2,tag:"interaction",type:"graph",objective:"LO11.4",image:"trade11.2.png",feedback:"After trade opens, the economy can consume at a different point from where it produces. Point C is the consumption point because it lies on the trade line BC1 and reaches a higher indifference curve."},
{id:277,q:"Refer to the graph above. What is the main gain from opening to trade?",options:["The economy can move from IC1 to IC2 and reach a higher level of satisfaction","The economy must consume at the same point where it produces","The production possibilities frontier shifts outward immediately","The economy becomes productively inefficient"],a:0,tag:"efficiency",type:"graph",objective:"LO11.4",image:"trade11.2.png",feedback:"Trade allows the economy to specialize in production and then exchange along the world price line. This makes it possible to move from the lower indifference curve IC1 to the higher indifference curve IC2, showing gains from trade."},
{id:278,q:"Refer to the natural monopoly graph above. If the government requires marginal-cost pricing, which point shows the regulated price and quantity?",options:["E at Q1","F at Q2","H at Q3","G at Q3"],a:2,tag:"power",type:"graph",objective:"LO12.5",image:"monopoly12.5.png",feedback:"Marginal-cost pricing requires price to equal marginal cost. On the graph, marginal cost pricing occurs at point H, where the demand curve intersects marginal cost at Q3 and price P1."},
{id:279,q:"Refer to the natural monopoly graph above. Under marginal-cost pricing, why might the firm need a subsidy?",options:["Price is below average cost, so the firm cannot cover total cost","Price is above marginal cost, so the firm earns monopoly profit","Quantity is too low, so consumers refuse to buy","Demand is below marginal revenue, so production stops"],a:0,tag:"power",type:"graph",objective:"LO12.5",image:"monopoly12.5.png",feedback:"At the marginal-cost pricing quantity Q3, the regulated price is P1. Average cost is higher at point G, so the firm loses money per unit unless the government provides a subsidy."},
{id:280,q:"Refer to the natural monopoly graph above. If the government uses average-cost pricing instead, what outcome occurs?",options:["The firm charges P2 at Q3 and earns positive economic profit","The firm charges P3 at Q2 and earns zero economic profit","The firm charges P1 at Q3 and requires no subsidy","The firm charges P4 at Q1 and produces the monopoly quantity"],a:1,tag:"power",type:"graph",objective:"LO12.5",image:"monopoly12.5.png",feedback:"Average-cost pricing sets price equal to average cost. On the graph, that occurs at point F, with price P3 and quantity Q2. Because price equals average cost, the firm earns zero economic profit."},
{id:281,q:"Refer to the monopolistically competitive firm graph above. What quantity and price will the firm choose to maximize profit?",options:["Q1 and P1","Q1 and P4","Q2 and P3","Q3 and P2"],a:0,tag:"power",type:"graph",objective:"LO13.4",image:"moncomp13.4.png",feedback:"A monopolistically competitive firm maximizes profit where marginal revenue equals marginal cost. That occurs at point B, which gives output Q1. The firm then moves up to the demand curve to find the price, which is P1 at point A."},
{id:282,q:"Refer to the monopolistically competitive firm graph above. At the profit-maximizing output, what profit is the firm earning?",options:["A positive economic profit because price is above marginal cost","A loss because price is below average total cost","Zero economic profit because price equals average total cost","Maximum profit because marginal cost is minimized"],a:2,tag:"power",type:"graph",objective:"LO13.4",image:"moncomp13.4.png",feedback:"At the profit-maximizing output Q1, the firm charges price P1. Point A shows that price is equal to average total cost at that output, so the firm earns zero economic profit."},
{id:283,q:"Refer to the monopolistically competitive firm graph above. Which statement best describes the firm's long-run outcome?",options:["The firm is both allocatively and productively efficient","The firm is allocatively efficient because price equals marginal cost at Q1","The firm earns zero economic profit but produces less than the output that minimizes average total cost","The firm earns positive economic profit because demand is downward sloping"],a:2,tag:"power",type:"graph",objective:"LO13.4",image:"moncomp13.4.png",feedback:"In long-run monopolistic competition, firms earn zero economic profit, but they do not produce at minimum average total cost. Here the firm produces at Q1, while the minimum ATC occurs farther right, so the firm has excess capacity."}
],

elite:[
{id:7000,q:"Demand for electric vehicles rises, increasing demand for lithium. Lithium prices rise, battery supply falls, and laptop producers also face higher costs. What is the best interpretation?",options:["Only the electric vehicle market is affected","A demand shock creates general equilibrium spillovers through shared inputs","Laptop demand must have increased first","Battery producers are acting like monopolists"],a:1,tag:"interaction",type:"integration",objective:"LO11.1",feedback:"The key is the shared input. A shock in one market can move prices and output in related markets."},
{id:7001,q:"A drought reduces wheat supply. Bread prices rise, cereal producers face higher input costs, and some consumers switch toward rice. What does this chain show?",options:["Only supply shifts matter","One market disturbance can affect complements, substitutes, and input markets","Demand curves never shift after supply shocks","All prices must return to their original levels"],a:1,tag:"interaction",type:"multi-step",objective:"LO11.1",feedback:"This is a linked-market adjustment. Inputs, substitutes, and related goods all react."},
{id:7002,q:"A new tax raises the cost of producing gasoline. Consumers buy fewer large trucks, demand for truck tires falls, and rubber prices decline. Which market link is doing most of the work?",options:["Shared input demand only","Linked demand across related goods and input markets","Monopoly price discrimination","Public good free riding"],a:1,tag:"interaction",type:"trap",objective:"LO11.1",feedback:"Gasoline, trucks, tires, and rubber are linked through related demand and input demand. A shock in one market can ripple through the rest."},
{id:7003,q:"A boom in construction raises wages for carpenters. Furniture firms lose workers and cut output. What is the best general equilibrium explanation?",options:["Furniture demand must have fallen directly","Labor reallocation changes costs and supply in related markets","Wages cannot link different industries","Construction and furniture markets are unrelated"],a:1,tag:"interaction",type:"integration",objective:"LO11.1",feedback:"Labor is a shared resource. When one sector pulls workers away, other sectors face higher labor costs or reduced labor supply."},

{id:7004,q:"An economy is on its PPF, but the slope of the PPF differs from consumers’ marginal rate of substitution. What is true?",options:["The economy is both productively and allocatively efficient","The economy is productively efficient but not allocatively efficient","The economy is inside the PPF","The allocation must be equitable"],a:1,tag:"efficiency",type:"trap",objective:"LO11.2",feedback:"Being on the PPF only means productive efficiency. Allocative efficiency requires MRT = MRS."},
{id:7005,q:"At the current output, consumers are willing to pay $45 for the next unit, while marginal cost is $30. What should happen to move toward efficiency?",options:["Output should decrease because cost is positive","Output should increase because marginal benefit exceeds marginal cost","Output should stay fixed because price is above zero","Output should fall until profit is zero"],a:1,tag:"efficiency",type:"calculation",objective:"LO11.2",feedback:"If marginal benefit exceeds marginal cost, society gains from producing more."},
{id:7006,q:"Two consumers have different MRS values for the same two goods. What does that imply?",options:["The allocation is Pareto efficient","A mutually beneficial trade may still be possible","The allocation is necessarily fair","Production must be inefficient"],a:1,tag:"efficiency",type:"trap",objective:"LO11.4",feedback:"Different MRS values mean the consumers value trades differently, so gains from exchange may remain."},
{id:7007,q:"A competitive market produces where P = MC, but the outcome gives most resources to one person. Which statement is strongest?",options:["The outcome is inefficient because it is unequal","The outcome may be efficient but inequitable","The outcome must be both fair and efficient","The market failed because profits exist"],a:1,tag:"equity",type:"integration",objective:"LO11.5",feedback:"Efficiency and equity are not the same thing. An outcome can maximize surplus and still look unfair."},

{id:7008,q:"A factory’s private marginal cost is $20, and each unit creates $8 of external harm. If the market ignores the harm, what is the social marginal cost?",options:["$12","$20","$28","$160"],a:2,tag:"failure",type:"calculation",objective:"LO11.3",feedback:"Social marginal cost equals private marginal cost plus external damage: 20 + 8 = 28."},
{id:7009,q:"A good creates external benefits, but buyers only consider their private benefit. What is the likely market result?",options:["Too much output because social benefit exceeds private benefit","Too little output because buyers ignore benefits to others","Efficient output because buyers pay the price","No output because external benefits are illegal"],a:1,tag:"failure",type:"trap",objective:"LO11.3",feedback:"Positive externalities cause underproduction because the market ignores some benefits."},
{id:7010,q:"A market has many buyers and sellers, but sellers dump waste into a river without paying for the damage. What should we conclude?",options:["Competition guarantees efficiency","The market can still fail because external costs are ignored","The market is efficient if firms earn zero profit","Externalities only matter under monopoly"],a:1,tag:"failure",type:"integration",objective:"LO11.3",feedback:"Competition alone does not fix unpriced external costs. That’s the trap."},
{id:7011,q:"Consumers cannot tell high-quality used cars from low-quality used cars, so owners of high-quality cars leave the market. What problem is this?",options:["Public good underproduction","Adverse selection from asymmetric information","Natural monopoly regulation","Perfect price discrimination"],a:1,tag:"failure",type:"multi-step",objective:"LO11.3",feedback:"Bad information can drive good products out of the market. That is adverse selection."},

{id:7012,q:"A monopolist faces demand P = 120 - 2Q and MC = 40. MR = 120 - 4Q. What price does the monopolist charge?",options:["$40","$60","$80","$120"],a:2,tag:"power",type:"calculation",objective:"LO12.2",feedback:"Set MR = MC: 120 - 4Q = 40, so Q = 20. Then P = 120 - 2(20) = 80."},
{id:7013,q:"A monopolist produces where MR = MC, but charges a price above MC. Why is this inefficient?",options:["The monopolist earns profit","Some units valued above marginal cost are not produced","Average cost must be rising","The monopolist has no fixed costs"],a:1,tag:"power",type:"trap",objective:"LO12.3",feedback:"The deadweight loss comes from restricted output. Profit is not the main villain here."},
{id:7014,q:"A firm charges a low per-unit price equal to MC plus a fixed membership fee. What pricing strategy is this?",options:["Peak-load pricing","Two-part tariff","Average-cost regulation","Cournot competition"],a:1,tag:"power",type:"interpretation",objective:"LO12.4",feedback:"A two-part tariff combines a fixed fee with a per-unit price."},
{id:7015,q:"A natural monopoly has MC below ATC over the relevant range of output. If regulators require P = MC, what problem can occur?",options:["The firm may earn losses unless subsidized","The firm earns monopoly profit","Output must fall to zero immediately","Price discrimination becomes impossible"],a:0,tag:"power",type:"multi-step",objective:"LO12.5",feedback:"Marginal-cost pricing can create losses for a natural monopoly when MC is below ATC."},

{id:7016,q:"Two firms sell identical products and compete in prices. MC = $10. Both charge $16. What happens if one firm cuts price to $15.50?",options:["It loses the whole market","It can capture the market while still pricing above MC","It must earn zero profit","The rival is forced to raise price"],a:1,tag:"strategy",type:"trap",objective:"LO13.1",feedback:"In homogeneous Bertrand competition, undercutting above MC is profitable because the lower-price firm captures buyers."},
{id:7017,q:"In Cournot competition, Firm A increases output. Firm B reduces output, but not enough to fully offset Firm A. What happens to total output and price?",options:["Total output rises and price falls","Total output falls and price rises","Total output is unchanged and price is unchanged","Total output rises and price rises"],a:0,tag:"strategy",type:"multi-step",objective:"LO13.1",feedback:"Cournot quantities are strategic substitutes, but total output usually still rises when one firm expands."},
{id:7018,q:"Two firms sell differentiated products. Firm A raises price. Why might Firm B also raise price?",options:["Differentiation softens competition, so best responses can move upward","Bertrand firms must always cut price to MC","Capacity constraints disappear","Consumers always buy the cheaper product"],a:0,tag:"strategy",type:"integration",objective:"LO13.2",feedback:"Differentiation weakens direct substitution. A rival’s price increase can give the other firm room to raise price too."},
{id:7019,q:"In a Stackelberg model, why can the first mover earn more than the follower?",options:["The leader commits to output while anticipating the follower’s response","The follower chooses output first","Both firms must produce equal output","The leader always prices at MC"],a:0,tag:"strategy",type:"interpretation",objective:"LO13.3",feedback:"The leader moves first and chooses output strategically, knowing how the follower will react."},
{id:7020,q:"A monopolistically competitive firm is earning positive profit in the short run. What happens in the long run?",options:["Entry shifts demand facing the firm left until economic profit is driven toward zero","The firm becomes a natural monopoly","Price must fall to marginal cost exactly","The firm exits because profit is positive"],a:0,tag:"strategy",type:"multi-step",objective:"LO13.4",feedback:"Entry steals customers from existing firms, reducing demand for each firm until economic profit is pushed toward zero."},

{id:7021,q:"A policy redistributes income from high-income consumers to low-income consumers but reduces total surplus. What is this?",options:["A Pareto improvement","An efficiency-equity tradeoff","A public good problem","A monopoly pricing strategy"],a:1,tag:"equity",type:"interpretation",objective:"LO11.5",feedback:"Equity may improve while efficiency falls. That is the tradeoff."},
{id:7022,q:"An allocation is Pareto efficient but gives almost everything to one person. What is the correct conclusion?",options:["It must be socially optimal","It may be efficient but still fail society’s fairness goals","It is not Pareto efficient because it is unequal","It proves markets always fail"],a:1,tag:"equity",type:"trap",objective:"LO11.5",feedback:"Pareto efficiency does not mean fairness. That misconception needs to get stunned."},
{id:7023,q:"According to the Second Welfare Theorem, how can society pursue a fairer efficient outcome?",options:["Redistribute initial endowments, then allow competitive trade","Ban trade after redistribution","Force all consumers to hold equal bundles","Set every price equal to average cost"],a:0,tag:"equity",type:"integration",objective:"LO11.5",feedback:"The idea is to separate redistribution from the trading process: adjust endowments first, then let markets work."},

{id:7024,q:"Refer to the monopoly graph above. Which sequence correctly describes the monopolist’s decision process?",options:["Choose Q where demand equals MC, then set price from MR","Choose Q where MR = MC, then set price from the demand curve","Choose Q where ATC is minimized, then set price equal to MC","Choose the efficient quantity, then set price equal to ATC"],a:1,tag:"power",type:"graph-integration",objective:"LO12.2",image:"monopoly12.2.png",feedback:"A monopolist chooses output where MR = MC, then moves up to the demand curve to find the price consumers will pay for that quantity."},
{id:7025,q:"Refer to the monopoly graph above. If the monopolist is earning zero economic profit at the chosen output, what must be true?",options:["Price equals marginal cost","Price equals average total cost","Marginal revenue equals demand","Average total cost equals marginal revenue"],a:1,tag:"power",type:"graph-trap",objective:"LO12.2",image:"monopoly12.2.png",feedback:"Profit depends on price compared with average total cost. Zero economic profit occurs when price equals ATC at the chosen output."},
{id:7026,q:"Refer to the monopoly graph above. Why does the monopoly outcome create deadweight loss?",options:["The monopolist produces beyond the efficient quantity","The monopolist produces less than the quantity where willingness to pay equals marginal cost","The monopolist always earns negative profit","The monopolist charges a price equal to marginal cost"],a:1,tag:"power",type:"graph-integration",objective:"LO12.3",image:"monopoly12.2.png",feedback:"Deadweight loss occurs because the monopolist restricts output below the efficient level. Some units that consumers value more than they cost to produce are not sold."},

{id:7027,q:"Refer to the Edgeworth Box above. If the current allocation is not on the contract curve, what should happen through voluntary trade?",options:["Trade should stop because the allocation is already efficient","Trade may continue until a Pareto efficient allocation is reached","Both people must receive identical bundles","One person must become worse off for any trade to occur"],a:1,tag:"efficiency",type:"graph-integration",objective:"LO11.4",image:"Edgeworth11.4.png",feedback:"If the allocation is not on the contract curve, mutually beneficial trade may still exist. Voluntary trade tends to move toward a Pareto efficient allocation."},
{id:7028,q:"Refer to the Edgeworth Box above. Which statement best explains why the contract curve does not solve the equity problem?",options:["The contract curve only identifies Pareto efficient allocations, not whether those allocations are fair","The contract curve only shows inefficient allocations","Every point on the contract curve gives both people equal amounts","Equity is guaranteed whenever trade is voluntary"],a:0,tag:"equity",type:"graph-trap",objective:"LO11.5",image:"Edgeworth11.4.png",feedback:"The contract curve shows efficiency, not fairness. A point can be Pareto efficient while still giving one person much more than the other."},
{id:7029,q:"Refer to the shaded Edgeworth Box above. What does the shaded lens around point A show?",options:["Allocations that are impossible after trade","Allocations that may be Pareto improvements from the starting point","Allocations that are less preferred by both people","Allocations where both people receive identical bundles"],a:1,tag:"efficiency",type:"graph",objective:"LO11.4",image:"edgeworth11.2.png",feedback:"The shaded lens shows possible gains from trade. These allocations can make at least one person better off without making the other worse off."},
{id:7030,q:"Refer to the trade graph above. Why can the economy consume at point C even though it produces at point A?",options:["Trade allows production and consumption to differ","The PPF shifts outward immediately","Point C is inside the PPF","The economy ignores opportunity cost"],a:0,tag:"interaction",type:"graph-integration",objective:"LO11.4",image:"trade11.2.png",feedback:"With trade, an economy can specialize in production and then exchange along the world price line. That allows consumption at a point different from production."},
{id:7031,q:"Refer to the trade graph above. What is the strongest evidence that trade improves welfare?",options:["The economy moves from IC1 to IC2","The economy produces fewer movies","The economy consumes fewer tacos","The budget constraint disappears"],a:0,tag:"efficiency",type:"graph",objective:"LO11.4",image:"trade11.2.png",feedback:"The move from IC1 to IC2 shows that trade allows the economy to reach a higher level of satisfaction."},

{id:7032,q:"Refer to the natural monopoly graph above. Which policy produces the efficient quantity but may require a subsidy?",options:["Unregulated monopoly pricing","Marginal-cost pricing","Average-cost pricing","Perfect price discrimination"],a:1,tag:"power",type:"graph-integration",objective:"LO12.5",image:"monopoly12.5.png",feedback:"Marginal-cost pricing sets price equal to marginal cost and produces the efficient quantity. But if price is below average cost, the firm needs a subsidy to avoid losses."},
{id:7033,q:"Refer to the natural monopoly graph above. Why is average-cost pricing often used instead of marginal-cost pricing?",options:["It lets the firm cover total cost without requiring a subsidy","It produces the fully efficient quantity","It gives the firm monopoly profit","It sets price equal to marginal revenue"],a:0,tag:"power",type:"graph-trap",objective:"LO12.5",image:"monopoly12.5.png",feedback:"Average-cost pricing allows the firm to break even because price equals average cost. The tradeoff is that output is usually below the fully efficient marginal-cost-pricing quantity."},

{id:7034,q:"Refer to the monopolistically competitive firm graph above. Why is the firm earning zero economic profit even though it has market power?",options:["Demand is tangent to average total cost at the profit-maximizing quantity","Price equals marginal cost","The firm produces at minimum average total cost","Marginal revenue equals demand"],a:0,tag:"strategy",type:"graph-integration",objective:"LO13.4",image:"moncomp13.4.png",feedback:"In long-run monopolistic competition, entry shifts each firm’s demand curve until it is tangent to ATC. The firm still has market power, but economic profit is zero."},
{id:7035,q:"Refer to the monopolistically competitive firm graph above. What inefficiency remains in the long run?",options:["The firm produces too much output","The firm produces where price equals marginal cost","The firm produces less than the output that minimizes average total cost","The firm earns permanent positive profit"],a:2,tag:"strategy",type:"graph-trap",objective:"LO13.4",image:"moncomp13.4.png",feedback:"Monopolistically competitive firms produce less than the output that minimizes ATC. This is excess capacity."}
]

// =============================================
// ANSWER SHUFFLING — DO NOT MODIFY CORE LOGIC
// =============================================
// Randomizes answer choices while preserving
// the correct answer index.
//
// Steps:
// 1. Copy original question (prevents mutation)
// 2. Store correct answer value
// 3. Shuffle options
// 4. Recalculate correct index (q.a)
//
// ---------------------------------------------
// DO NOT MODIFY:
// - correct answer tracking logic
// - q.a reassignment
// - structure of returned object
//
// Breaking this WILL cause:
// - incorrect answers being marked correct
// - correct answers being marked wrong
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding extra fields (if needed)
// - minor formatting changes
//
// This function ensures fairness in answer order.
// =============================================   
function shuffleOptions(question){
    let q = {
        id: question.id,
        q: question.q,
        options: [...question.options],
        a: question.a,
        feedback: question.feedback,
        hint: question.hint,
        tag: question.tag,
        type: question.type,
        objective: question.objective,
        image: question.image
    };

    let correct = q.options[q.a];

    for(let i = q.options.length - 1; i > 0; i--){
        let j = Math.floor(Math.random() * (i + 1));
        [q.options[i], q.options[j]] = [q.options[j], q.options[i]];
    }

    q.a = q.options.indexOf(correct);

    return q;
}

// Keep structure consistent (q, options, a, feedback)
       
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function getMonopolyCalc(){
    let a = rand(80,140);
    let b = rand(1,3);
    let mc = rand(10,40);

    // MR = a - 2bQ. Continuous optimum: Q = (a - MC) / (2b)
    let qExact = (a - mc) / (2 * b);

    // Because this game uses whole-number quantities, check nearby whole-number outputs.
    let qLow = Math.max(0, Math.floor(qExact));
    let qHigh = Math.max(0, Math.ceil(qExact));

    function profitAt(q){
        let p = a - b * q;
        return (p - mc) * q;
    }

    let q = profitAt(qHigh) > profitAt(qLow) ? qHigh : qLow;
    let price = a - b * q;

    return {
        id:10000,
        q:`A monopolist faces demand P = ${a} - ${b}Q and MC = ${mc}.
What price will the firm charge?`,
        options:[
            `$${mc}`,
            `$${price}`,
            `$${a}`,
            `$${a - b*(q+5)}`
        ],
        a:1,
        tag:"power",
        type:"calculation",
        objective:"LO 12.2",
        feedback:"Set MR = MC to find the profit-maximizing quantity, then plug that quantity into demand to find price. Do not stop at quantity."
    };
}

function getEfficiencyTrap(){
    let p = rand(12,30);
    let mc = p + rand(-10,10);

    return {
        id:10001,
        q:`A competitive market has P = ${p} and MC = ${mc}.
Which statement is TRUE?`,
        options:[
            "Market clearing alone proves the outcome is efficient",
            mc === p
                ? "The outcome is efficient because P = MC"
                : (p > mc
                    ? "The market underproduces relative to the efficient level"
                    : "The market overproduces relative to the efficient level"),
            "Efficiency depends on ATC",
            "Profit determines efficiency"
        ],
        a:1,
        tag:"efficiency",
        type:"trap",
        objective:"LO 11.2",
        feedback:"Allocative efficiency requires P = MC. Market clearing by itself is not enough, ATC is a distraction, and profit is not the efficiency rule."
    };
}

function getBertrandTrap(){
    let mc = rand(5,20);
    let high = mc + rand(6,15);

    return {
        id:10002,
        q:`Two firms compete in prices with identical products and MC = ${mc}.
Both currently charge $${high}.
What is the BEST response for one firm?`,
        options:[
            "Raise price to increase profit",
            `Lower price slightly below $${high}`,
            `Set price equal to $${mc}`,
            "Do nothing because this is equilibrium"
        ],
        a:1,
        tag:"strategy",
        type:"trap",
        objective:"LO 13.1",
        feedback:"With identical products, any price above marginal cost creates an incentive to undercut the rival and capture the market."
    };
}

function getSpilloverChain(){
    const goods = [
        {base:"housing", input:"lumber", downstream:"furniture"},
        {base:"cars", input:"steel", downstream:"appliances"},
        {base:"smartphones", input:"chips", downstream:"laptops"},
        {base:"bread", input:"wheat", downstream:"cereal"}
    ];

    let pick = goods[Math.floor(Math.random()*goods.length)];

    return {
        id:10003,
        q:`Demand for ${pick.base} increases sharply. Production expands, raising the price of ${pick.input}.
What is the MOST likely effect in the ${pick.downstream} market?`,
        options:[
            `${pick.downstream} production costs rise, shifting supply left`,
            `${pick.downstream} demand rises directly`,
            `No effect because these are separate markets`,
            `${pick.downstream} prices fall due to higher input prices`
        ],
        a:0,
        tag:"interaction",
        type:"trap",
        objective:"LO 11.1",
        feedback:"When related industries use the same input, a demand shock in one market can raise input costs and shift supply left in another market."
    };
}

function getCournotTrap(){
    let qA = rand(20,50);
    let change = rand(5,15);

    return {
        id:10004,
        q:`Two firms compete in quantities (Cournot).
Firm A increases output from ${qA} to ${qA + change}.
What is the MOST likely response from Firm B and the market price?`,
        options:[
            "Firm B increases output, price rises",
            "Firm B decreases output, price falls",
            "Firm B increases output, price falls",
            "Firm B decreases output, price rises"
        ],
        a:1,
        tag:"strategy",
        type:"trap",
        objective:"LO 13.1",
        feedback:"In Cournot competition, quantities are usually strategic substitutes, so Firm B tends to reduce output. But total market output still rises, which pushes price down."
    };
}

function getPriceDisc(){
    let groupA = rand(1,3);
    let groupB = rand(4,8);

    let higher = groupA < groupB ? "Group A" : "Group B";

    return {
        id:10005,
        q:`A monopolist sells to two groups.
Group A has elasticity of demand = ${groupA}.
Group B has elasticity of demand = ${groupB}.

Which group will be charged the higher price?`,
        options:[
            "Group A",
            "Group B",
            "Both groups pay the same price",
            "Not enough information"
        ],
        a: higher === "Group A" ? 0 : 1,
        tag:"power",
        type:"trap",
        objective:"LO 12.4",
        feedback:"The monopolist charges the higher price to the group with lower elasticity because that group is less sensitive to price changes."
    };
}

// RANDOMIZATION SYSTEM — DO NOT MODIFY CORE LOGIC
// =============================================
// Controls fair, non-repeating selection of:
// - calculation generators
// - question pools
//
// Uses "shuffle + bag" system to ensure:
// - no immediate repeats
// - full coverage before reuse
//
// ---------------------------------------------
// SAFE TO EDIT:
// - adding new generators (calculationGenerators)
// - modifying pool content
//
// DO NOT MODIFY:
// - shuffle logic
// - bag system (calcBag, _remaining)
// - pop() usage
//
// Breaking this WILL cause:
// - repeated questions
// - uneven distribution
// - predictable patterns
//
// This ensures randomness WITHOUT repetition.
// =============================================     

// Fisher-Yates shuffle (uniform random order)
// Do not modify — ensures unbiased randomness     
function shuffle(arr){
    for(let i = arr.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

// Bag system for calculation generators
// Ensures all generators are used before repeating
let calcBag = [];

// Pulls one calculation generator from the bag
// Refills bag when empty (reshuffled)
function pickCalcGenerator(){
    if(calcBag.length === 0){
        calcBag = shuffle([...calculationGenerators]);
    }
    return calcBag.pop();
}

// Generic bag-based random picker for any pool
// Prevents repeats until pool is exhausted
function pickRandom(pool){
    if(!pool._remaining || pool._remaining.length === 0){
        pool._remaining = shuffle([...pool]);
    }
    return pool._remaining.pop();
}

// Changing this WILL:
// - invalidate all existing completion codes
// - break verification consistency
//
// ---------------------------------------------
// SAFE TO EDIT (if absolutely necessary):
// - "ARCHIVE42" → change only if rebranding ALL codes
// - "ARCH-" prefix → cosmetic only
//
// This is NOT encryption.
// It is a lightweight integrity check.
// =============================================
function generateCode(name, acc, streak, total){
    let str = `${name}|${acc}|${streak}|${total}|DOMINION66`;
    let hash = 0;

    for(let i = 0; i < str.length; i++){
        hash = (hash << 5) - hash + str.charCodeAt(i);
        hash |= 0;
    }

    return "DOM-" + Math.abs(hash).toString(36).toUpperCase();
}

// =============================================
// ARRAY SHUFFLE UTILITY — SAFE TO USE, DO NOT MODIFY
// =============================================
// Fisher-Yates shuffle algorithm.
//
// Used to randomize:
// - question order
// - calculation generators
// - any randomized sequences
//
// DO NOT MODIFY unless you understand:
// - uniform randomness
// - bias in random selection
//
// Breaking this = predictable patterns in questions
// =============================================     
function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
    return arr;
}

function updateHighScores(newTimeMs) {
    let scores = JSON.parse(localStorage.getItem("gauntletHighScores")) || [];
    scores.push({ name: username, time: newTimeMs, date: new Date().toLocaleDateString() });
    
    // Sort by time (lowest/fastest first) and keep top 5
    scores.sort((a, b) => a.time - b.time);
    scores = scores.slice(0, 5);
    
    localStorage.setItem("gauntletHighScores", JSON.stringify(scores));
    return scores;
}

// Converts milliseconds → readable format (Xm Ys)

// Safe to modify format if desired.

function formatTime(ms) {
    let mins = Math.floor(ms / 60000);
    let secs = Math.floor((ms / 1000) % 60);
    return `${mins}m ${secs}s`;
}
