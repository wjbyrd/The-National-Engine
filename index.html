/* =========================================
   1. VISUAL DESIGN — THE NATIONAL ENGINE
========================================= */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow-x: hidden;
    color: #f3ead2;
    background: url('question_background_image.png');
    background-size: cover;
    background-position: center;
}

/* Macro Review overlay — onyx, ivory, restrained gold */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at center,
            rgba(245, 214, 130, 0.09),
            rgba(30, 24, 18, 0.34) 48%,
            rgba(3, 5, 12, 0.82) 100%);
    pointer-events:none;
    z-index:-1;
}
    
.dungeon-container {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
}

/* CENTER BLOCK */   	
.start-content{
    width: 100%;
    max-width: 460px;
    display:flex;
    flex-direction:column;
    align-items:center;   
    text-align:center;
    padding: 28px 30px;
    border-radius: 18px;
}

    0 3px 8px rgba(0,0,0,0.9);
}

/* SUBTITLE — shift to blue tone */	
.subtitle{

  margin-bottom:35px;
  letter-spacing:2px;

/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
========================================= */

#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    margin: 0;
    padding: 18px 20px;
    text-align: center;

    background: radial-gradient(circle at center,
        rgba(42,74,64,0.34) 0%,
        rgba(18,24,24,0.92) 52%,
        rgba(4,5,5,0.98) 100%);

    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-sizing: border-box;

    box-shadow:
        0 0 24px rgba(214,177,92,0.24),
        0 0 70px rgba(88,28,24,0.28),

    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease, border-color .3s ease;
    position: relative;
}

/* Boss state styling — triggered during boss fights (DO NOT REMOVE) */
#gameBox.boss-mode {
    border: 2px solid #d6b15c;
    box-shadow:
        0 0 32px rgba(214,177,92,0.58),
        0 0 64px rgba(100,36,24,0.48),
        inset 0 0 42px rgba(0,0,0,0.78);
}

.boss-icon{
    width: 28px;
    height: 28px;
    object-fit: contain;
    pointer-events: none;
}

/* Tier 1 — Registrar of False Measures */

        drop-shadow(0 0 6px rgba(214,177,92,0.85))

/* Tier 2 — Warden of Labor Flows */
.boss20 .boss-icon{

#questionImageBox img{

/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
========================================= */

/* Base button styling — applies to all buttons */
button {
    padding: 12px 22px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;

    background: linear-gradient(180deg, #5b3a1f, #1b1711);
    color: #f3ead2;

    border: 1px solid rgba(214,177,92,0.42);
    border-radius: 8px;

    box-shadow:
       0 0 12px rgba(214,177,92,0.24),
       0 0 24px rgba(88,28,24,0.18),
       inset 0 0 10px rgba(0,0,0,0.62);

    transition: all 0.15s ease;
}

/* Hover feedback — improves interactivity */
button:hover {
    background: linear-gradient(180deg, #7a4a25, #2a1b12);
    border-color: rgba(240,199,94,0.7);

    box-shadow:
        0 0 18px rgba(240,199,94,0.48),
        0 0 34px rgba(127,29,29,0.28),
        inset 0 0 12px rgba(0,0,0,0.68);

    transform: translateY(-2px) scale(1.02);
}

/* Click feedback — simulates button press */
button:active {
    transform: scale(0.96);
}

/* Answer container — controls layout of choices */
.answers {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
    width: 100%;
}

/* Individual answer buttons — flexible sizing */
.answers button {
    flex: 1 1 100%;
    min-height: 60px;
    max-width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 0;

    background: linear-gradient(180deg,
        rgba(55,70,58,0.96),
        rgba(12,18,18,0.98));

    color: #f3ead2;
    border: 1px solid rgba(214,177,92,0.34);

    box-shadow:
        0 0 10px rgba(214,177,92,0.16),
        inset 0 0 14px rgba(0,0,0,0.7);
}

/* Answer hover — a little brighter than base */
.answers button:hover {
    background: linear-gradient(180deg,
        rgba(73,92,72,0.98),
        rgba(31,40,34,0.98));

    border-color: rgba(240,199,94,0.68);

    box-shadow:
        0 0 18px rgba(214,177,92,0.38),
        0 0 32px rgba(65,95,78,0.22),
        inset 0 0 14px rgba(0,0,0,0.68);
}

/* Utility button (fullscreen toggle) — safe to restyle or move */
.fullscreenBtn {
    position: absolute;
    top: 12px;
    left: 12px;

    padding: 6px 12px;
    font-size: 12px;
    letter-spacing: 1px;

    color: #f3ead2;
    background: linear-gradient(180deg, #4a3320, #11100d);

        0 0 10px rgba(214,177,92,0.22),

}

.fullscreenBtn:hover {
    background: linear-gradient(180deg, #6a4726, #1c1510);
    border-color: rgba(240,199,94,0.62);

    box-shadow:
        0 0 16px rgba(214,177,92,0.42),

.fullscreenBtn:active {

        0 0 8px rgba(214,177,92,0.28),

.continue-btn {

    box-shadow:

/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
========================================= */
    
/* Progress bar container — background track */
#progressBar {
    width: 100%;
    height: 22px;

    background: linear-gradient(180deg,
        rgba(12,18,18,0.95),
        rgba(4,5,5,0.98));

    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;

    border: 1px solid rgba(214,177,92,0.22);

    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.82),
        0 0 10px rgba(214,177,92,0.12);
}
    
/* Progress fill — width controlled by JS */
#progressFill {
    height: 100%;
    width: 0%;

    background: linear-gradient(90deg,
        #2f4f43,
        #d6b15c,
        #8a3a24);

    box-shadow:
        0 0 12px rgba(214,177,92,0.45),
        0 0 22px rgba(127,29,29,0.25);

    transition: width 0.4s ease;
}

/* Maze grid layout — 10 columns = 30 total rooms */
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}
    
/* Individual room cell — default state */
.maze-box {
    width: 36px;
    height: 36px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 20px;
    border-radius: 6px;

    background: linear-gradient(180deg,
        rgba(22,30,28,0.72),
        rgba(7,9,9,0.86));

    border: 1px solid rgba(214,177,92,0.18);

    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.72),
        0 0 5px rgba(214,177,92,0.08);

    transition: all 0.3s ease;
}

/* Current room highlight — animated pulse */
.maze-box.active {
    background: radial-gradient(circle,
        rgba(214,177,92,0.48),
        rgba(65,95,78,0.36),
        rgba(12,18,18,0.92));

    border: 2px solid #f0c75e;

    box-shadow:
        0 0 12px rgba(240,199,94,0.78),
        0 0 24px rgba(214,177,92,0.48),
        inset 0 0 12px rgba(0,0,0,0.62);

    z-index: 10;
    animation: activePulse 1s infinite alternate;
}

/* Completed tile */
.maze-box.completed {
    background: linear-gradient(180deg,
        rgba(65,95,78,0.62),
        rgba(20,31,28,0.88));

    border-color: rgba(214,177,92,0.38);

    box-shadow:
        0 0 8px rgba(214,177,92,0.28),
        inset 0 0 10px rgba(0,0,0,0.7);
}

/* Boss room highlights (10, 20, 30) — visual only */
.maze-box:nth-child(10) {
    text-shadow:
        0 0 8px #d6b15c,
        0 0 18px rgba(65,95,78,0.8);
}

.maze-box:nth-child(20) {
    text-shadow:
        0 0 8px #c46a3a,
        0 0 18px rgba(127,29,29,0.75);
}

.maze-box:nth-child(30) {
    text-shadow:
        0 0 10px #f0c75e,
        0 0 24px rgba(127,29,29,0.95),
        0 0 34px rgba(214,177,92,0.42);
}

/* Streak styling — National Engine */
.streak {
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    letter-spacing:0.5px;
    color: rgba(243,234,210,0.94);
    text-shadow:
        0 0 7px rgba(214,177,92,0.32),
        0 2px 5px rgba(0,0,0,0.85);
}

.streak-icon {
    width:22px;
    height:22px;
    object-fit:contain;
    border-radius:50%;

    filter:
        drop-shadow(0 0 8px rgba(214,177,92,0.75))
        drop-shadow(0 0 15px rgba(100,36,24,0.52));

    background: radial-gradient(circle,
        rgba(240,199,94,0.46) 0%,
        rgba(65,95,78,0.34) 45%,
        transparent 72%);

    animation: pulseControl 2.2s ease-in-out infinite;
}
   
/* =========================================
   6. ARTIFACT SYSTEM (REWARDS) — SAFE TO CUSTOMIZE
========================================= */
    
/* Reward popup — appears after boss victory */
#artifactDrop {
    margin-top: 20px;
    padding: 14px;

    background: radial-gradient(circle at center,
        rgba(65,95,78,0.34),
        rgba(12,18,18,0.96) 62%,
        rgba(4,5,5,0.98));

    border-radius: 10px;
    border: 1px solid rgba(214,177,92,0.34);

    box-shadow:
        0 0 22px rgba(214,177,92,0.28),
        0 0 42px rgba(127,29,29,0.22),
        inset 0 0 28px rgba(0,0,0,0.76);

    text-align: center;
}
    
/* Artifact image in popup */
#artifactImage {
    width: 96px;
    margin-bottom: 8px;
}

#artifactDrop img {
    filter:
        drop-shadow(0 0 14px rgba(240,199,94,0.82))
        drop-shadow(0 0 26px rgba(127,29,29,0.42));
}

/* Persistent artifact collection display (top panel) */
#artifactVault {
    margin-top: -6px;
    width: 220px;
    padding: 18px;
    border-radius: 12px;

    background: radial-gradient(circle at top,
        rgba(65,95,78,0.42),
        rgba(12,18,18,0.96) 58%,
        rgba(4,5,5,0.98));

    border: 1px solid rgba(214,177,92,0.3);

    box-shadow:
        0 0 20px rgba(214,177,92,0.22),
        0 0 38px rgba(88,28,24,0.20),
        inset 0 0 30px rgba(0,0,0,0.76);

    text-align: center;
}

#artifactVault h3 {
    color: #f4d58d;
    text-shadow:
        0 0 10px rgba(214,177,92,0.52),
        0 2px 6px rgba(0,0,0,0.85);
}

/* Layout container for artifact slots */
.vaultRow {
    display: flex;
    justify-content: center;
    align-items:flex-end;
    gap: 15px;
    flex-wrap:wrap;
}

/* Individual artifact slot (default = locked state) */    
.artifactSlot {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    min-width: 70px;
    text-align:center;
    opacity: .26;

    transition: all .4s ease;
}

/* Locked artifact image (dimmed effect) */    
.artifactSlot img {
    width: 45px;
    margin-bottom:4px;

    filter:
        brightness(0.28)
        contrast(0.85)
        sepia(0.35);

    transition: all .4s ease;
}

/* Artifact label text */
.artifactSlot span {
    display: block;
    font-size: 13px;
    color: rgba(216,199,160,0.38);
    margin-top: 8px;
    line-height: 1.2;
}

/* Glow + animation for unlocked artifacts */
.artifactSlot.unlocked {
    opacity: 1;
    transform: scale(1.05);
}

.artifactSlot.unlocked img {
    filter:
        drop-shadow(0 0 14px rgba(240,199,94,0.86))
        drop-shadow(0 0 26px rgba(214,177,92,0.46))
        drop-shadow(0 0 34px rgba(127,29,29,0.24));

    animation: relicPulse 2.5s ease-in-out infinite;
    backface-visibility: hidden;
    transform: translateZ(0);
}

.artifactSlot.unlocked span {
    color: #f3ead2;
    font-weight: 600;
    text-shadow:
        0 0 7px rgba(214,177,92,0.38),
        0 2px 5px rgba(0,0,0,0.85);
}

/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — SAFE TO CUSTOMIZE
========================================= */
    
/* Hit animation — triggered when boss takes damage */
.boss-shake {
    animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

/* Boss image display — includes floating animation */
.bossIcon {
    width: 96px;
    height: auto;
    display: block;
    margin: 0 auto 12px auto;
    animation: bossFloat 4s ease-in-out infinite;
}

/* Boss-specific glow effects */
.registrarGlow {
    filter:
        drop-shadow(0 0 12px rgba(214,177,92,0.82))
        drop-shadow(0 0 24px rgba(65,95,78,0.50))
        drop-shadow(0 0 34px rgba(0,0,0,0.75));
}

.wardenGlow {
    filter:
        drop-shadow(0 0 14px rgba(196,106,58,0.88))
        drop-shadow(0 0 28px rgba(127,29,29,0.58))
        drop-shadow(0 0 38px rgba(0,0,0,0.78));
}

.comptrollerGlow {
    filter:
        drop-shadow(0 0 16px rgba(240,199,94,0.96))
        drop-shadow(0 0 34px rgba(127,29,29,0.74))
        drop-shadow(0 0 46px rgba(214,177,92,0.34))
        drop-shadow(0 0 52px rgba(0,0,0,0.82));
}

/* Ambient torch effect — decorative, shown during gameplay */
.torch {
    position: absolute;
    width: 70px;
    top: 30px;
    z-index: 10;
    animation: torchFlicker 3s infinite alternate;
    pointer-events: none;
    opacity: .92;

    filter:
        drop-shadow(0 0 12px rgba(240,199,94,0.68))
        drop-shadow(0 0 24px rgba(127,29,29,0.26));

    display:none;
}

/* Torch positioning (left/right sides of screen) */
.left-torch {
    left: 18px;
}

.right-torch {
    right: 18px;
    transform: scaleX(-1);
}

/* =========================================
   8. FULLSCREEN SCREENS & TRANSITIONS — SAFE TO CUSTOMIZE
========================================= */

/* Fullscreen start screen — shown before game begins */    
#startScreen{
  position: fixed;
  inset: 0;

  background-image:
    linear-gradient(
        rgba(4,5,5,0.22),
        rgba(4,5,5,0.46)
    ),
    url('start screen image.png');

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  z-index: 100;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  overflow-y: auto;
  overflow-x: hidden;
  padding: 0px 20px;
  box-sizing: border-box;
}

/* Transition overlay — appears between rooms (controlled by JS) */
#hallwayTransition {
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  height: 100%;

  background:
    linear-gradient(
        rgba(4,5,5,0.64),
        rgba(4,5,5,0.74)
    ),
    url('hallway1.png');

  background-size: cover;
  background-position: center;

  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;

  color: #f3ead2;
  font-size: 26px;

  z-index: 200;
  opacity: 0;
  pointer-events: none;

  transition: opacity 1.2s ease;
  animation: hallwayZoom 3.2s ease-out forwards;
}

/* Activates transition visibility (DO NOT REMOVE) */    
#hallwayTransition.active {
  opacity: 1;
}

/* Text container for transition messages */
#hallwayText {
  max-width: 600px;

  background: radial-gradient(circle at center,
      rgba(65,95,78,0.30),
      rgba(12,18,18,0.82) 58%,
      rgba(4,5,5,0.92));

  padding: 30px;
  border-radius: 10px;

  border: 1px solid rgba(214,177,92,0.28);

  box-shadow:
      0 0 24px rgba(0,0,0,0.82),
      0 0 28px rgba(214,177,92,0.18),
      inset 0 0 26px rgba(0,0,0,0.72);

  color: #f3ead2;

  text-shadow:
      0 0 8px rgba(214,177,92,0.26),
      0 2px 6px rgba(0,0,0,0.9);
}

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
========================================= */

/* Ambient lighting effect (environmental immersion) */    
@keyframes torchFlicker {
  0%, 100% {
    filter: brightness(1);
  }
  25% {
    filter: brightness(1.05) saturate(1.04);
  }
  50% {
    filter: brightness(0.96) saturate(0.98);
  }
  75% {
    filter: brightness(1.04) saturate(1.03);
  }
}

/* Damage feedback (quick impact effect) */    
@keyframes hitshake {
  0% {
    transform: translateX(0);
  }
  25% {
    transform: translateX(-8px);
  }
  50% {
    transform: translateX(8px);
  }
  75% {
    transform: translateX(-6px);
  }
  100% {
    transform: translateX(0);
  }
}

/* Boss-specific hit feedback (stronger shake) */    
@keyframes bossShake {
  10%, 90% {
    transform: translate3d(-1px, 0, 0);
  }
  20%, 80% {
    transform: translate3d(2px, 0, 0);
  }
  30%, 50%, 70% {
    transform: translate3d(-4px, 0, 0);
  }
  40%, 60% {
    transform: translate3d(4px, 0, 0);
  }
}

/* Current room highlight animation (maze tracker) */   
@keyframes activePulse {
  0% {
    transform: scale(1.06);
    box-shadow:
      0 0 8px rgba(214,177,92,0.68),
      inset 0 0 10px rgba(0,0,0,0.6);
  }

  45% {
    transform: scale(1.13);
    box-shadow:
      0 0 18px rgba(240,199,94,0.92),
      0 0 32px rgba(214,177,92,0.48),
      0 0 42px rgba(65,95,78,0.24),
      inset 0 0 12px rgba(0,0,0,0.64);
  }

  70% {
    transform: scale(1.09);
    box-shadow:
      0 0 12px rgba(214,177,92,0.78),
      0 0 24px rgba(127,29,29,0.24),
      inset 0 0 11px rgba(0,0,0,0.64);
  }

  100% {
    transform: scale(1.11);
    box-shadow:
      0 0 15px rgba(240,199,94,0.72),
      0 0 30px rgba(214,177,92,0.36),
      inset 0 0 12px rgba(0,0,0,0.68);
  }
}

/* Victory text animation (end screen emphasis) */    
@keyframes victoryGlow {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 10px rgba(240,199,94,0.72),
      0 2px 6px rgba(0,0,0,0.9);
  }

  50% {
    transform: scale(1.08);
    text-shadow:
      0 0 24px rgba(240,199,94,0.95),
      0 0 42px rgba(214,177,92,0.62),
      0 0 52px rgba(127,29,29,0.36),
      0 3px 8px rgba(0,0,0,0.9);
  }
}

/* Idle boss movement (subtle hovering effect) */    
@keyframes bossFloat {
  0%, 100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-6px);
  }
}

/* Temporary feedback text fade-out */   
@keyframes fadeOut {
  0%, 70% {
    opacity: 1;
  }

  100% {
    opacity: 0;
  }
}

/* Wizard idle animation (subtle movement) */    
@keyframes wizardFloat {
  0%,100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-5px);
  }
}

/* General UI entrance animation */    
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }

  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* General pulse animation for relics */   
@keyframes relicPulse {
  0%,100% {
    transform: scale(1.05);
    filter:
      drop-shadow(0 0 8px rgba(214,177,92,0.66))
      drop-shadow(0 0 18px rgba(65,95,78,0.34))
      drop-shadow(0 0 24px rgba(0,0,0,0.55));
  }

  50% {
    transform: scale(1.1);
    filter:
      drop-shadow(0 0 16px rgba(240,199,94,0.92))
      drop-shadow(0 0 30px rgba(214,177,92,0.55))
      drop-shadow(0 0 38px rgba(127,29,29,0.24));
  }
}

/* Streak Icon Glow */
@keyframes pulseControl {
  0%,100% {
    transform: scale(1);
    opacity: 0.9;
  }

  50% {
    transform: scale(1.08);
    opacity: 1;
  }
}

/* =========================================
   10. PANEL LAYOUT SYSTEM — SAFE TO CUSTOMIZE (WITH LIMITS)
========================================= */

/* =========================================
   12. MOBILE RESPONSIVE SYSTEM — SAFE TO EDIT (WITH LIMITS)
=========================================

This section controls how the game behaves on phones.

GOAL:
- Fit gameplay into a single screen as much as possible
- Reduce vertical scrolling
- Keep buttons thumb-friendly

-----------------------------------------
SAFE TO EDIT:
- font sizes (clamp values)
- spacing (gap, padding, margin)
- grid layout (answers: 1fr 1fr vs 1fr)
- wizard size (make smaller/larger)

-----------------------------------------
USE CAUTION:
- removing elements entirely (may break flow)
- changing flex direction randomly
- making buttons too small (hurts usability)

-----------------------------------------
DO NOT MODIFY:
- IDs (#gameShell, #gameBox, #wizardBox)
- core layout structure

-----------------------------------------
COMMON CUSTOM CHANGES:
- Want bigger buttons? Increase min-height
- Want less scrolling? Reduce padding/gaps
- Want simpler UI? Hide artifact labels

-----------------------------------------
TIP:
Mobile design is about SPACE, not style.
Every pixel matters.

========================================= */

@media (max-width: 768px){
  .fullscreenBtn{
    display: none !important;
  }

  /* overall page tightening */
  .dungeon-container{
    gap: 8px;
    margin-top: 4px;
    align-items: center;
  }

  .top-panel{
    width: 100%;
    max-width: 650px;
    gap: 2px;
    margin: 0 auto 4px auto;
    align-items: center;
  }

  .top-title{
    font-size: clamp(14px, 3.6vw, 18px);
    margin-bottom: 2px;
    text-align: center;
  }

  .fullscreenBtn{
    position: static;
    display: block;
    align-self: flex-start;
    margin: 0 0 4px 0;
    padding: 6px 10px;
    font-size: 11px;
  }

/* =========================================
   MAZE TRACK (PROGRESSION GRID)

Controls:
- 30-room visual tracker (10x3 grid)
- player position feedback
- boss indicators

-----------------------------------------
SAFE TO EDIT:
- box size (.maze-box)
- spacing (gap)
- colors and glow

-----------------------------------------
USE CAUTION:
- grid-template-columns (must stay 10)
- extreme sizing (can overflow screen)

-----------------------------------------
DO NOT CHANGE:
- total structure (30 rooms)

-----------------------------------------
TIP:
On mobile, shrinking gap and font-size
saves a LOT of vertical space.

========================================= */
  #mazeTrackContainer{
    width: 100%;
    max-width: 100%;
    padding: 2px 4px;
    margin: 0 auto;
  }

  #mazeTrack{
    gap: 3px;
    width: 100%;
    justify-content: center;
  }

  .maze-box{
    aspect-ratio: 1 / 1;
    min-width: 0;
    width: 100%;
    height: auto;
    font-size: 10px;
    border-radius: 3px;
  }

  .boss-icon{
    width: 16px;
    height: 16px;
  }

/* =========================================
   ARTIFACT VAULT (REWARD DISPLAY)

Controls:
- unlocked items
- visual reward system
- top HUD footprint

-----------------------------------------
SAFE TO EDIT:
- icon size
- spacing
- label text

-----------------------------------------
USE CAUTION:
- opacity (controls locked vs unlocked)
- layout (affects mobile height)

-----------------------------------------
DO NOT MODIFY:
- .artifactSlot.unlocked (JS controlled)

-----------------------------------------
TIP:
If mobile is too tall, shrink this section
or hide labels entirely.

========================================= */
  #artifactVault{
    width: 100%;
    max-width: 100%;
    padding: 4px 6px;
  }

  #artifactVault h3{
    font-size: 13px;
    margin: 0 0 4px 0;
    text-align: center;
  }

  .vaultRow{
    gap: 8px;
    justify-content: center;
    align-items: flex-start;
  }

  .artifactSlot{
    flex: 1 1 0;
    min-width: 0;
    text-align: center;
  }

  .artifactSlot img{
    width: 20px;
    margin-bottom: 2px;
  }

  .artifactSlot span{
    font-size: 8px;
    line-height: 1.05;
    margin-top: 2px;
  }

  /* main stack */
  .main-panel{
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
  }

  #gameShell{
    flex-direction: column;
    width: 100%;
    max-width: 100%;
    padding: 6px;
    gap: 6px;
    margin: 0 auto;
  }

/* =========================================
   WIZARD PANEL — SAFE TO RESIZE

Controls:
- wizard image
- wizard name
- vertical footprint

-----------------------------------------
SAFE TO EDIT:
- width / max-width (mobile especially)
- padding (reduce for smaller screens)
- image size (#wizardImage)

-----------------------------------------
DO NOT REMOVE:
- flex layout (keeps alignment correct)

-----------------------------------------
TIP:
If mobile feels cramped, shrink THIS first.

========================================= */
  #wizardBox{
    width: 100%;
    max-width: 170px;
    min-width: 0;
    min-height: auto;
    padding: 4px;
    padding-top: 6px;

  }

  #wizardName{

    margin-top: 2px;
    margin-bottom: 2px;
    padding-bottom: 2px;
    text-align: center;
  }

  #wizardImage{
    width: 100%;
    max-width: 80px;
    margin: 0 auto;

  }

  /* game box tighter */

  }

  #autosave{
    position: static;
    display: block;
    text-align: right;
    margin-bottom: 4px;
    font-size: 10px;
  }

  .area-title{
    font-size: 11px;
    letter-spacing: 1.5px;
    margin-bottom: 6px;
    text-align: center;
  }

  #progressBar{
    height: 12px;
    margin-bottom: 8px;
  }

  #streakDisplay{
    margin-bottom: 6px;
    text-align: center;
  }

  #question{
    font-size: clamp(15px, 4.2vw, 20px);
    line-height: 1.3;
    margin: 6px 0;
    text-align: center;
  }

  #message{
    margin-top: 4px;
    margin-bottom: 4px;
    font-size: 14px;
    text-align: center;
  }

  .hint-box{
    font-size: 11px;
    margin-top: 8px;
    height: auto;
    text-align: center;
  }
/* =========================================
   ANSWER SYSTEM (INTERACTION CORE)

Controls:
- layout of answer choices
- button sizing and spacing

-----------------------------------------
SAFE TO EDIT:
- grid vs column layout
- button size (min-height)
- font size

-----------------------------------------
USE CAUTION:
- making buttons too small
- changing layout drastically

-----------------------------------------
COMMON OPTIONS:
- 2x2 grid (compact, less scrolling)
- 1 column (easier reading, more scroll)

-----------------------------------------
TIP:
2x2 grid is best for mobile balance.

========================================= */
  .answers{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    width: 100%;
    margin-top: 6px;
  }

  .answers button{
    width: 100%;
    min-height: 52px;
    padding: 10px;
    font-size: 13px;
    margin: 0;
    border-radius: 10px;
  }
}

function generatePseudonymFromEmail(email) {
    const titles = [
        "Axiom", "Ledger", "Vector", "Meridian", "Signal", "Cipher",
        "Frontier", "Equity", "Oracle", "Index", "Summit", "Nexus",
        "Vault", "Prism", "Civic", "Astral", "Beacon", "Horizon"
    ];

    const roles = [
        "Appraiser", "Cartographer", "Arbiter", "Custodian", "Warden", "Registrar",
        "Archivist", "Surveyor", "Magistrate", "Keeper", "Analyst", "Mediator",
        "Steward", "Scribe", "Sentinel", "Marshal", "Seeker", "Auditor"
    ];

    let hash = 0;
    const cleanEmail = email.trim().toLowerCase();

    for (let i = 0; i < cleanEmail.length; i++) {
        hash = ((hash << 5) - hash) + cleanEmail.charCodeAt(i);
        hash |= 0;
    }

    const positiveHash = Math.abs(hash);

    const title = titles[positiveHash % titles.length];
    const role = roles[Math.floor(positiveHash / titles.length) % roles.length];
    const number = 1000 + (positiveHash % 9000);

    return `${title}${role}${number}`;
}

function getTypeBucket(tag, type){

    if(!tagBucket.byType[key]){
        tagBucket.byType[key] = {
            attempts: 0,
            correct: 0,
            avgTime: 0
        };

    return tagBucket.byType[key];
}

function getSkillKey(question){

function getObjectiveBucket(question){

            correct: 0,

    return getFluency(getObjectiveBucket(question), question?.type || "default");
}

function updateBucket(bucket, isCorrect, responseTime){
    if(!bucket) return;
    bucket.attempts++;
    if(isCorrect) bucket.correct++;
    bucket.avgTime = bucket.avgTime === 0
        ? responseTime
        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));
}

function getAccuracy(bucket){
    if(!bucket || !bucket.attempts) return null;
    return bucket.correct / bucket.attempts;
}

function getTimeRatio(bucket, type){
    if(!bucket || !bucket.attempts || !bucket.avgTime) return 1;
    return bucket.avgTime / getTypeTargetMs(type);
}

function getFluency(bucket, type){
    const acc = getAccuracy(bucket);
    if(acc === null) return 0;
    const timeRatio = getTimeRatio(bucket, type);
    return acc - clamp((timeRatio - 1) * 0.25, 0, 0.35);
}

function getTagAccuracy(tag){
    return getAccuracy(getTagBucket(tag));
}

function getTagTypeAccuracy(tag, type){
    return getAccuracy(getTypeBucket(tag, type));
}

function getTagFluency(tag){
    return getFluency(getTagBucket(tag), "default");
}

function getTagTypeFluency(tag, type){
    return getFluency(getTypeBucket(tag, type), type || "default");
}

function recordAdaptiveAttempt(question, isCorrect, responseTime){
    if(!question || !question.tag) return;

    const tagBucket = getTagBucket(question.tag);
    const typeBucket = getTypeBucket(question.tag, question.type);
    const objectiveBucket = getObjectiveBucket(question);
	const skillBucket = getSkillBucket(question);

    updateBucket(tagBucket, isCorrect, responseTime);
    updateBucket(typeBucket, isCorrect, responseTime);
    updateBucket(objectiveBucket, isCorrect, responseTime);
	updateBucket(skillBucket, isCorrect, responseTime);

    masteryState.recent.push({
        correct: !!isCorrect,
        responseTime,
        tag: question.tag,
        type: question.type || "default",
        objective: currentQuestion.objective || inferObjective(currentQuestion),
		skill: getSkillKey(question)
    });

    if(masteryState.recent.length > 20){
        masteryState.recent.shift();
    }
}

function getRecentPerformance(windowSize = 8){
    const recent = masteryState.recent.slice(-windowSize);
    if(recent.length === 0){
        return { accuracy: 0, avgCorrectRatio: 1.2, count: 0 };
    }

    const correct = recent.filter(x => x.correct);
    const avgCorrectRatio = correct.length
        ? correct.reduce((sum, item) => sum + (item.responseTime / getTypeTargetMs(item.type)), 0) / correct.length
        : 2;

    return {
        accuracy: recent.filter(x => x.correct).length / recent.length,
        avgCorrectRatio,
        count: recent.length
    };
}

function getWeakestTag(){
    const entries = Object.keys(masteryState.byTag);

    if(entries.length === 0){
        const fallback = Object.entries(conceptMemory || {}).sort((a,b) => b[1]-a[1])[0];
        return fallback ? fallback[0] : null;
    }

    let weakestTag = null;
    let weakestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const weakness = (conceptMemory[tag] || 0) + (1 - (fluency ?? 0));

        if(weakness > weakestScore){
            weakestScore = weakness;
            weakestTag = tag;
        }
    });

    return weakestTag;
}

function getStrongestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0) return null;

    let strongestTag = null;
    let strongestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const strength = (fluency === null ? 0 : fluency) - ((conceptMemory[tag] || 0) * 0.15);
        if(strength > strongestScore){
            strongestScore = strength;
            strongestTag = tag;
        }
    });

    return strongestTag;
}

function getBossObjectiveKey(question){
    if(!question) return null;

    const rawObjective = question.objective || inferObjective(question);
    if(!rawObjective) return null;

    const match = String(rawObjective).match(/^LO\d+\.\d+/);
    return match ? match[0] : rawObjective;
}

function getObjectiveFamilyStats(objectiveKey){
    let attempts = 0;
    let correct = 0;
    let weightedTime = 0;

    Object.keys(masteryState.byObjective || {}).forEach(key => {
        if(key === objectiveKey || key.startsWith(objectiveKey + "_")){
            const bucket = masteryState.byObjective[key];
            if(!bucket) return;

            attempts += bucket.attempts || 0;
            correct += bucket.correct || 0;
            weightedTime += (bucket.avgTime || 0) * (bucket.attempts || 0);
        }
    });

    return {
        attempts,
        correct,
        accuracy: attempts ? correct / attempts : null,
        avgTime: attempts ? weightedTime / attempts : 0
    };
}

function getWeakestBossObjective(bank){
    if(!Array.isArray(bank) || bank.length === 0) return null;

    const objectives = [...new Set(
        bank.map(q => getBossObjectiveKey(q)).filter(Boolean)
    )];

    const eligibleObjectives = objectives.filter(obj =>
        bank.filter(q => getBossObjectiveKey(q) === obj).length >= 3
    );

    if(eligibleObjectives.length === 0) return null;

    let weakestObjective = null;
    let weakestScore = -Infinity;

    eligibleObjectives.forEach(obj => {
        const stats = getObjectiveFamilyStats(obj);

        let score = 0.25;

        if(stats.accuracy !== null){
            score = (1 - stats.accuracy) * 2;
            score += Math.min(stats.attempts, 5) * 0.08;
        }

        const recentMisses = (masteryState.recent || []).filter(item => {
            const itemObjective = item.objective || "";
            return (itemObjective === obj || itemObjective.startsWith(obj + "_")) && !item.correct;
        }).length;

        score += recentMisses * 0.25;

        if(stats.avgTime && stats.avgTime > TYPE_TIME_TARGETS.default){
            score += 0.15;
        }

        if(score > weakestScore){
            weakestScore = score;
            weakestObjective = obj;
        }
    });

    return weakestObjective || eligibleObjectives[Math.floor(Math.random() * eligibleObjectives.length)];
}

function getSelectionProfile(){
    const recent = getRecentPerformance(8);
    const strongestTag = getStrongestTag();
    const strongestFluency = strongestTag ? getTagFluency(strongestTag) : 0;

    return {
        recentAccuracy: recent.accuracy,
        avgCorrectRatio: recent.avgCorrectRatio,
        strongestTag,
        strongestFluency,
        mediumReady: streak >= 5 && recent.count >= 5 && recent.accuracy >= 0.8,
        hardReady: streak >= 8 && recent.count >= 6 && recent.accuracy >= 0.88 && recent.avgCorrectRatio <= 1.2 && strongestFluency >= 0.72,
        eliteReady: streak >= 14 && recent.count >= 8 && recent.accuracy >= 0.92 && recent.avgCorrectRatio <= 1.05 && strongestFluency >= 0.82
    };
}

function determineSelectionPurpose(profile){
    if(profile.recentAccuracy === 0 && getRecentPerformance(8).count === 0) return "support";
    if(profile.eliteReady) return "stretch";
    if(profile.recentAccuracy < 0.65) return "repair";
    if(profile.recentAccuracy < 0.8) return "confirm";
    if(profile.hardReady) return "challenge";
    return "diversify";
}

function shouldTriggerDetour(question){
    if(!question || !question.tag) return false;
    const tagWeakness = conceptMemory[question.tag] || 0;
    const typeBucket = getTypeBucket(question.tag, question.type);
    const typeAccuracy = getAccuracy(typeBucket);
    const objectiveAccuracy = getObjectiveAccuracy(question);

    return tagWeakness >= 2.2
        || (typeBucket && typeBucket.attempts >= 2 && typeAccuracy !== null && typeAccuracy < 0.6)
        || (objectiveAccuracy !== null && objectiveAccuracy < 0.5 && getObjectiveBucket(question).attempts >= 2);
}

function planRemediation(question, responseTime){
    if(!question || !question.tag) return null;

    const expected = getTypeTargetMs(question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const objectiveAccuracy = getAccuracy(objectiveBucket);
    const objectiveAttempts = objectiveBucket?.attempts || 0;
    const carelessMiss = responseTime < expected * 0.55 && (objectiveAccuracy === null || objectiveAccuracy >= 0.45);
    const repeatedObjectiveMiss = objectiveAttempts >= 2 && objectiveAccuracy !== null && objectiveAccuracy < 0.6;
    const slowStruggle = responseTime > expected * 1.2;
	const skill = getSkillKey(question);

    return {
        active: true,
        stage: carelessMiss ? "bridge" : "repair",
        tag: question.tag,
        objective: currentQuestion.objective || inferObjective(currentQuestion),
		skill: skill,
		commonError: question.commonError || null,
        sourceType: question.type || "default",
        returnRoom: room,
        originQuestionId: question.id || null,
        careless: carelessMiss,
        repeatedObjectiveMiss,
        slowStruggle
    };
}

function getQuestionsMatchingNeed(pool, objectiveKey, tag, excludeIds = [], skillKey = null){
    if(!Array.isArray(pool) || pool.length === 0) return [];

    let candidates = pool.filter(q => !excludeIds.includes(q.id));

    if(skillKey){
        let skillMatches = candidates.filter(q =>
            q.primarySkill === skillKey || q.repairSkill === skillKey
        );
        if(skillMatches.length > 0) return skillMatches;
    }

    let objectiveMatches = candidates.filter(q => inferObjective(q) === objectiveKey);
    if(objectiveMatches.length > 0) return objectiveMatches;

    let tagMatches = candidates.filter(q => q.tag === tag);
    if(tagMatches.length > 0) return tagMatches;

    return candidates;
}

}

function pickRemediationFromBank(poolName, objectiveKey, tag, purpose = "confirm", skillKey = null){
    const pool = questionBanks[poolName] || [];
    const recentIds = (questionHistory[poolName] || []).slice(-10);

    let candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, recentIds, skillKey);

    if(candidates.length === 0){
        candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, [], skillKey);
    }

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],
        purpose
    });

    if(!questionHistory[poolName]) questionHistory[poolName] = [];
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15) questionHistory[poolName].shift();

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10) tagHistory.shift();
    }

    return picked;
}

function getRemediationQuestion(state){
    if(!state || !state.active) return null;

    const excludeIds = [state.originQuestionId].filter(Boolean);

    if(state.stage === "repair"){
        if(state.skill && microSkillRepairPools[state.skill]){
            const skillRepairPool = microSkillRepairPools[state.skill] || [];
            const skillRepairCandidates = getQuestionsMatchingNeed(
                skillRepairPool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillRepairCandidates.length > 0){
                return weightedPick(skillRepairCandidates, {
                    mode: "support",
                    purpose: "repair"
                });
            }
        }

        const repairPool = microSkillRepairPools[state.skill] || [];
        const repairCandidates = getQuestionsMatchingNeed(
            repairPool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(repairCandidates.length > 0){
            return weightedPick(repairCandidates, {
                mode: "support",
                purpose: "repair"
            });
        }
    }

    if(state.stage === "bridge"){
        if(state.skill && microSkillBridgePools[state.skill]){
            const skillBridgePool = microSkillBridgePools[state.skill] || [];
            const skillBridgeCandidates = getQuestionsMatchingNeed(
                skillBridgePool,
                state.objective,
                state.tag,
                excludeIds,
                state.skill
            );

            if(skillBridgeCandidates.length > 0){
                return weightedPick(skillBridgeCandidates, {
                    mode: "support",
                    purpose: "confirm"
                });
            }
        }

        const bridgePool = microSkillBridgePools[state.skill] || [];
        const allBridgePool = Object.values(microSkillBridgePools || {})
            .reduce((all, pool) => all.concat(pool), []);

        const bridgeCandidates = getQuestionsMatchingNeed(
            allBridgePool,
            state.objective,
            state.tag,
            excludeIds,
            state.skill
        );

        if(bridgeCandidates.length > 0){
            return weightedPick(bridgeCandidates, {
                mode: "support",
                purpose: "confirm"
            });
        }
    }

    const retestPoolName = getRetestPoolName();

    return pickRemediationFromBank(
        retestPoolName,
        state.objective,
        state.tag,
        state.stage === "retest" ? "challenge" : "confirm",
        state.skill
    );
}
	 
function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){
    let pool = questionBanks[poolName] || questionBanks.hard || questionBanks.medium || questionBanks.easy || [];
    const { mode = "support", preferredTypes = [], purpose = "diversify" } = options;

    if(!pool || pool.length === 0){
        return {
            id: 999999,
            q: "No question pool is available for this room. Check the questionBanks configuration.",
            options: ["Continue", "Continue", "Continue", "Continue"],
            a: 0,
            tag: "system",
            type: "default",
            objective: "system_check",
            feedback: "A question pool is missing."
        };
    }

    // --- 🎯 TARGET SPECIFIC TAG IF PROVIDED ---
    if(targetTag){
        let filtered = pool.filter(q => q.tag === targetTag);

        if(filtered.length >= Math.max(4, pool.length * 0.2)){
            pool = filtered;
        }
    }

    let recent = questionHistory[poolName].slice(-10);

    let available = pool.filter(q => !recent.includes(q.id));

    if(available.length < 3){
        available = pool.filter(q => !questionHistory[poolName].slice(-5).includes(q.id));
    }

    if(available.length === 0){
        available = pool.filter(q => !questionHistory[poolName].slice(-3).includes(q.id));
    }

    if(available.length === 0){
        available = pool;
    }

    let lastTags = tagHistory.slice(-2);

    let tagFiltered = available.filter(q => {
        return !(lastTags.length === 2 && lastTags.every(t => t === q.tag));
    });

    if(tagFiltered.length >= 3){
        available = tagFiltered;
    }

    console.log("AVAILABLE:", available.map(q => q.id));

    let picked = weightedPick(available, { mode, preferredTypes, purpose });

    console.log("PICKED:", picked.id);
    console.log("RECENT:", questionHistory[poolName]);

    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15){
        questionHistory[poolName].shift();
    }

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10){
            tagHistory.shift();
        }
    }

    return picked;
}

function initializeRunForMode(mode){
    gameMode = mode || "standard";

    const autosave = document.getElementById("autosave");
    if(autosave){
        autosave.innerText = gameMode === "timed"
            ? "⏱ Timed Trial Active"
            : gameMode === "exam"
                ? "✎ Exam Drill Active"
                : gameMode === "legendary"
                    ? "🔥 Legendary Mode Active"
                    : gameMode === "bossRush"
                        ? "⚔ Boss Rush Active"
                        : "💾 Progress Saved Locally";
    }

    if(gameMode === "timed"){
        startTimedModeClock();
    } else {
        stopTimedModeClock();
    }

function startTimedModeClock(){
    timedModeEndTime = Date.now() + timedModeDurationMs;

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "flex";

    updateTimedModeClock();

    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
    }

    timedModeTimerInterval = setInterval(updateTimedModeClock, 250);
}

function stopTimedModeClock(){
    if(timedModeTimerInterval){
        clearInterval(timedModeTimerInterval);
        timedModeTimerInterval = null;
    }

    const hud = document.getElementById("timedModeHud");
    if(hud) hud.style.display = "none";

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.classList.remove("timer-warning");
        timerDisplay.innerText = "10:00";
    }
}

function updateTimedModeClock(){
    if(gameMode !== "timed" || !timedModeEndTime) return;

    const remainingMs = Math.max(0, timedModeEndTime - Date.now());
    const totalSeconds = Math.ceil(remainingMs / 1000);
    const minutes = Math.floor(totalSeconds / 60);
    const seconds = totalSeconds % 60;

    const timerDisplay = document.getElementById("timerDisplay");
    if(timerDisplay){
        timerDisplay.innerText = `${minutes}:${String(seconds).padStart(2, "0")}`;
        timerDisplay.classList.toggle("timer-warning", remainingMs <= 60 * 1000);
    }

    if(remainingMs <= 0){
        endTimedModeRun();
    }
}

function endTimedModeRun(){
    if(gameMode !== "timed") return;

    stopTimedModeClock();
    gameMode = "timed-complete";

    const accuracy = totalAttempts > 0
        ? Math.round((correctAnswers / totalAttempts) * 100)
        : 0;

    const bestRoom = Number(localStorage.getItem("nationalEngineTimedBestRoom") || 0);
    if(timedHighestRoom > bestRoom){
        localStorage.setItem("nationalEngineTimedBestRoom", String(timedHighestRoom));
    }

    localStorage.setItem("nationalEngineTimedLastRoom", String(room));
    localStorage.setItem("nationalEngineTimedLastHighestRoom", String(timedHighestRoom));
    localStorage.setItem("nationalEngineTimedLastAccuracy", String(accuracy));
    localStorage.setItem("nationalEngineTimedLastAttempts", String(totalAttempts));
    localStorage.setItem("nationalEngineTimedLastStreak", String(maxStreak));
    localStorage.setItem("nationalEngineTimedLastSetbacks", String(timedSetbacks));

	recordTimedTrialAchievementStats(accuracy, timedHighestRoom);

    sendGameData({
        runID: runID,
        game: "The National Engine",
        event: "timed_complete",
        user: username,
        email: studentEmail,
        room: room,
        questionId: 0,

        streak: streak,
        elapsedTime: startTime ? (Date.now() - startTime) : 0,
        adaptiveMode: "timed_complete",
        totalTime: timedModeDurationMs,
        accuracy: accuracy / 100,
        maxStreak: maxStreak,
        totalAttempts: totalAttempts
    });

    document.getElementById("bossMessage").innerText = "";
    document.getElementById("formulaHint").innerText = "";
    document.getElementById("artifactDrop").style.display = "none";

function getDifficultyForMode(){
    if(gameMode === "exam" || gameMode === "timed"){
        return (room <= 10) ? "easy"
            : (room <= 20) ? "medium"
            : "hard";
    }

    if(gameMode === "legendary"){
        return (room === 10 || room === 20 || room === 30)
            ? "legendaryBoss"
            : "legendary";
    }

    if(gameMode === "bossRush"){
        return (room <= 10) ? "easyBoss"
            : (room <= 20) ? "mediumBoss"
            : "finalBoss";
    }

    return (room <= 9) ? "easy"
         : (room === 10) ? "easyBoss"
         : (room <= 19) ? "medium"
         : (room === 20) ? "mediumBoss"
         : (room <= 25) ? "hard"
         : (room <= 29) ? "hard"
         : "finalBoss";
}

{"id":9009,"sourceGame":"nationalEngine","q":"Output is fixed by production. Taxes fall, MPC is 0.8, and G is fixed. What happens to demand composition?","options":["C rises, saving falls, and investment is pressured down","C falls, saving rises, and investment rises","C rises, output rises, and investment is unchanged","C is unchanged, saving falls, and output rises"],"a":0,"tag":"production","type":"integration","objective":"LO3.1","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"production_function_output","secondarySkills":["mpc_disposable_income","saving_identity_calculation"],"repairSkill":"production_function_output","commonError":"treats_tax_cut_as_output_expansion_in_fixed_output_model","feedback":"With output fixed, a tax cut raises consumption, lowers national saving, raises r, and pressures investment down."},
{"id":9010,"sourceGame":"nationalEngine","q":"A firm’s MPL schedule is 30, 24, 18, 12, 6. Price is $4 and wage is $60. How many workers are hired?","options":["3","2","4","5"],"a":0,"tag":"labor_demand","type":"calculation","objective":"LO3.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"labor_demand_mpl_real_wage","secondarySkills":[],"repairSkill":"labor_demand_mpl_real_wage","commonError":"uses_nominal_wage_instead_of_real_wage","feedback":"The real wage is 60/4 = 15. The first three workers have MPL above 15; the fourth has 12."},
{"id":9011,"sourceGame":"nationalEngine","q":"Output rises from 0 to 15 to 29 to 40 to 48 to 51. If W/P = 9, how many workers should be hired?","options":["3","4","5","2"],"a":0,"tag":"labor_demand","type":"multi-step","objective":"LO3.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"total_product_to_marginal_product","secondarySkills":["labor_demand_mpl_real_wage"],"repairSkill":"total_product_to_marginal_product","commonError":"uses_total_product_levels_not_marginal_product","feedback":"MPL values are 15, 14, 11, 8, and 3. The firm hires the first three workers and stops before the fourth because MPL falls below W/P.","image":"totalproduct.png"},
{"id":9012,"sourceGame":"nationalEngine","q":"Capital falls after a shock while labor is fixed. Which factor-price pattern is most likely?","options":["MPK rises and MPL falls","MPK falls and MPL rises","Both MPK and MPL rise","Both MPK and MPL fall"],"a":0,"tag":"factor_prices","type":"integration","objective":"LO3.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"diminishing_marginal_product","secondarySkills":["labor_demand_mpl_real_wage"],"repairSkill":"diminishing_marginal_product","commonError":"misses_cross_factor_effect","feedback":"Scarcer capital raises MPK, but less capital per worker lowers labor productivity and MPL."},
{"id":9013,"sourceGame":"nationalEngine","q":"Refer to the marginal product graph. A real wage increase plus better technology affects labor demand how?","options":["Quantity effect is ambiguous because wage and MPL shift conflict","Labor demand must rise because technology improves","Labor demand must fall because wages rise","Labor demand is fixed by the CPI"],"a":0,"tag":"labor_demand","type":"graph_integration","objective":"LO3.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"labor_demand_mpl_real_wage","secondarySkills":["diminishing_marginal_product"],"repairSkill":"labor_demand_mpl_real_wage","commonError":"ignores_offsetting_wage_and_productivity_effects","feedback":"Higher technology shifts MPL up, but a higher real wage moves the firm toward less labor. The net quantity effect is ambiguous.","image":"marginalproduct.png"},
{"id":9014,"sourceGame":"nationalEngine","q":"A worker’s nominal wage rises 10%, output price rises 15%, and MPL is unchanged. What happens to the firm’s hiring incentive?","options":["Hiring becomes more attractive because the real wage falls","Hiring becomes less attractive because the nominal wage rises","Hiring is unchanged because MPL is unchanged","Hiring stops because inflation is positive"],"a":0,"tag":"factor_prices","type":"trap","objective":"LO3.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"labor_demand_mpl_real_wage","secondarySkills":[],"repairSkill":"labor_demand_mpl_real_wage","commonError":"looks_only_at_nominal_wage","feedback":"The price level rose faster than the wage, so W/P falls and hiring becomes more attractive at unchanged MPL."},
{"id":9015,"sourceGame":"nationalEngine","q":"Labor increases while capital is fixed. In Cobb-Douglas logic, what happens to MPL, MPK, and real wages?","options":["MPL falls, MPK rises, real wages fall","MPL rises, MPK falls, real wages rise","MPL falls, MPK falls, real wages rise","MPL rises, MPK rises, real wages fall"],"a":0,"tag":"factor_prices","type":"integration","objective":"LO3.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"diminishing_marginal_product","secondarySkills":["factor_income_distribution"],"repairSkill":"diminishing_marginal_product","commonError":"misses_cross_productivity_effect","feedback":"More labor lowers MPL and the real wage, but raises MPK because capital is used with more labor."},
{"id":9016,"sourceGame":"nationalEngine","q":"If alpha = 0.35, technology grows 2%, capital grows 6%, and labor grows 2%, approximate output growth is what?","options":["5.4%","4.6%","6.0%","8.0%"],"a":0,"tag":"cobb_douglas","type":"multi-step","objective":"LO3.3","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"cobb_douglas_factor_share_calculation","secondarySkills":["production_function_output"],"repairSkill":"cobb_douglas_factor_share_calculation","commonError":"misweights_capital_and_labor_growth","feedback":"Growth is about 2% + 0.35(6%) + 0.65(2%) = 2 + 2.1 + 1.3 = 5.4%."},
{"id":9017,"sourceGame":"nationalEngine","q":"In a Cobb-Douglas economy, alpha = 0.4, total income is 9000, and output rises to 9900 with alpha unchanged. What are the initial labor income and the increase in capital income?","options":["Labor income 5400; capital income rises 360","Labor income 3600; capital income rises 540","Labor income 5400; capital income rises 900","Labor income 3600; capital income rises 360"],"a":0,"tag":"factor_shares","type":"multi-step","objective":"LO3.3","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"cobb_douglas_factor_share_calculation","secondarySkills":["factor_income_distribution"],"repairSkill":"cobb_douglas_factor_share_calculation","commonError":"reverses_alpha_and_one_minus_alpha_or_uses_total_output_change","feedback":"Initial labor income is 0.6×9000 = 5400. Output rises by 900, and capital receives 40%, so capital income rises by 360."},
{"id":9018,"sourceGame":"nationalEngine","q":"Technology raises output, but capital’s income share also rises. Which critique fits the basic Cobb-Douglas benchmark?","options":["Stable factor shares may fail when technology favors capital","Technology cannot affect income distribution","Capital share must fall when output rises","Labor always receives all productivity gains"],"a":0,"tag":"income_distribution","type":"policy","objective":"LO3.3","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"factor_income_distribution","secondarySkills":["cobb_douglas_factor_share_calculation"],"repairSkill":"factor_income_distribution","commonError":"treats_cobb_douglas_as_literal_always_true","feedback":"Basic Cobb-Douglas gives stable shares, but capital-biased technology can push capital’s actual share upward."},
{"id":9019,"sourceGame":"nationalEngine","q":"Factors are paid marginal products under constant returns, but accounting profit is positive. Which explanation best preserves the theory?","options":["Accounting profit may include returns to owner-supplied capital","Economic profit must be positive because accounting profit is positive","Labor must receive less than its marginal product in every case","The GDP deflator must be rising faster than real GDP"],"a":0,"tag":"income_distribution","type":"trap","objective":"LO3.3","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"factor_income_distribution","secondarySkills":[],"repairSkill":"factor_income_distribution","commonError":"confuses_accounting_profit_with_economic_profit","feedback":"Accounting profit can include the return to capital owned by the firm’s owners. That does not mean pure economic profit is positive."},
{"id":9020,"sourceGame":"nationalEngine","q":"Alpha is 0.25. Capital rises 8%, labor falls 4%, and technology rises 3%. Approximate output growth is what?","options":["2.0%","4.0%","6.0%","0.0%"],"a":0,"tag":"cobb_douglas","type":"multi-step","objective":"LO3.3","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"cobb_douglas_factor_share_calculation","secondarySkills":["production_function_output"],"repairSkill":"cobb_douglas_factor_share_calculation","commonError":"ignores_negative_labor_growth","feedback":"Growth is 3% + 0.25(8%) + 0.75(-4%) = 3 + 2 - 3 = 2%."},
{"id":9021,"sourceGame":"nationalEngine","q":"C = 400 + 0.75(Y - T), Y = 5000, T = 1000, and G = 1200. What are C and national saving?","options":["C = 3400; S = 400","C = 3400; S = 1600","C = 4150; S = -350","C = 3000; S = 800"],"a":0,"tag":"consumption_function","type":"multi-step","objective":"LO3.4","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"consumption_function_calculation","secondarySkills":["saving_identity_calculation"],"repairSkill":"consumption_function_calculation","commonError":"mixes_private_and_national_saving","feedback":"Disposable income is 4000, so C = 400 + 0.75(4000) = 3400. National saving = Y - C - G = 400."},
{"id":9022,"sourceGame":"nationalEngine","q":"A tax cut of 200 occurs with MPC = 0.6, Y and G fixed. What happens to consumption and national saving?","options":["C rises 120; S falls 120","C rises 80; S falls 80","C rises 200; S unchanged","C falls 120; S rises 120"],"a":0,"tag":"consumption","type":"multi-step","objective":"LO3.4","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"mpc_disposable_income","secondarySkills":["saving_identity_calculation"],"repairSkill":"mpc_disposable_income","commonError":"uses_mps_or_public_saving_only","feedback":"A 200 tax cut raises disposable income by 200, consumption by 120, and lowers national saving by 120."},
{"id":9023,"sourceGame":"nationalEngine","q":"Refer to the consumption function graph. Wealth falls while taxes also fall. What is the net effect on consumption?","options":["Ambiguous because wealth shifts down and taxes raise disposable income","Consumption must rise because taxes fall","Consumption must fall because wealth falls","Consumption is fixed because Y is fixed"],"a":0,"tag":"consumption_function","type":"graph_integration","objective":"LO3.4","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"consumption_movement_vs_shift","secondarySkills":["mpc_disposable_income"],"repairSkill":"consumption_movement_vs_shift","commonError":"ignores_offsetting_shift_and_movement","feedback":"Lower wealth shifts consumption down, while lower taxes raise disposable income and move along the function. Net effect is ambiguous.","image":"consumptionfunction.png"},
{"id":9024,"sourceGame":"nationalEngine","q":"Nominal interest is 11%, inflation is 4%, and I = 3200 - 200r. If expected profits then shift investment demand down by 300, what is investment?","options":["1500","1800","2100","1000"],"a":0,"tag":"investment","type":"multi-step","objective":"LO3.4","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"real_interest_investment_calculation","secondarySkills":["investment_function_movement_vs_shift"],"repairSkill":"real_interest_investment_calculation","commonError":"uses_nominal_rate_or_ignores_investment_shift","feedback":"Real r = 11 - 4 = 7. Baseline investment is 3200 - 200(7) = 1800. The negative demand shift lowers investment to 1500."},
{"id":9025,"sourceGame":"nationalEngine","q":"Refer to the investment function graph. Expected profits rise while r rises. What must be true?","options":["The effect on investment depends on relative sizes","Investment must rise because the curve shifts right","Investment must fall because r rises","Investment must stay fixed by saving"],"a":0,"tag":"investment_function","type":"graph_integration","objective":"LO3.4","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"investment_function_movement_vs_shift","secondarySkills":[],"repairSkill":"investment_function_movement_vs_shift","commonError":"ignores_offsetting_shift_and_movement","feedback":"Expected profits shift investment demand right, but a higher real interest rate reduces investment along the curve. Net effect is ambiguous.","image":"investmentfunction.png"},
{"id":9026,"sourceGame":"nationalEngine","q":"Investment is I = 2600 - 100r. Nominal r stays 8%, inflation rises from 2% to 5%. What happens to investment?","options":["It rises by 300","It falls by 300","It rises by 600","It is unchanged"],"a":0,"tag":"investment","type":"multi-step","objective":"LO3.4","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"real_interest_investment_calculation","secondarySkills":[],"repairSkill":"real_interest_investment_calculation","commonError":"misses_real_rate_decline","feedback":"Real r falls from 6 to 3, so investment rises from 2000 to 2300."},
{"id":9027,"sourceGame":"nationalEngine","q":"Refer to the investment graph. A move from I1 at high r to I2 at low r means what combined forces occurred?","options":["Investment demand rose and the real interest rate fell","Investment demand fell and the real interest rate rose","Only expected profits changed","Only the real interest rate changed"],"a":0,"tag":"investment_function","type":"graph_interpretation","objective":"LO3.4","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"investment_function_movement_vs_shift","secondarySkills":[],"repairSkill":"investment_function_movement_vs_shift","commonError":"sees_shift_or_movement_but_not_both","feedback":"Moving from I1 to I2 means investment demand increased, while the move to lower r means borrowing costs fell.","image":"investmentfunction.png"},
{"id":9028,"sourceGame":"nationalEngine","q":"Y = 8000, C = 5200, G = 2100, and T = 1800. What are private saving, public saving, and national saving?","options":["1000, -300, 700","700, -300, 1000","1000, 300, 1300","2800, -300, 2500"],"a":0,"tag":"national_saving","type":"multi-step","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"saving_identity_calculation","secondarySkills":[],"repairSkill":"saving_identity_calculation","commonError":"reverses_private_public_saving","feedback":"Private saving = 8000 - 1800 - 5200 = 1000. Public saving = 1800 - 2100 = -300. National saving = 700."},
{"id":9029,"sourceGame":"nationalEngine","q":"A balanced-budget increase raises G and T by 400. MPC = 0.75 and Y is fixed. What happens to national saving?","options":["It falls by 100","It rises by 100","It is unchanged","It falls by 400"],"a":0,"tag":"fiscal_policy","type":"multi-step","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"fiscal_policy_crowding_out","secondarySkills":["mpc_disposable_income"],"repairSkill":"fiscal_policy_crowding_out","commonError":"assumes_balanced_budget_means_no_saving_change","feedback":"Higher G lowers S by 400, while higher T lowers C by 300, raising S by 300. Net S falls by 100."},
{"id":9030,"sourceGame":"nationalEngine","q":"A tax cut of 500 has MPC = 0.8. What happens to private saving, public saving, and national saving?","options":["Private +100; public -500; national -400","Private +400; public -500; national -100","Private -100; public +500; national +400","Private +500; public -400; national +100"],"a":0,"tag":"national_saving","type":"multi-step","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"saving_identity_calculation","secondarySkills":["fiscal_policy_crowding_out"],"repairSkill":"saving_identity_calculation","commonError":"looks_only_at_private_saving","feedback":"Disposable income rises 500, C rises 400, so private saving rises 100. Public saving falls 500. National saving falls 400."},
{"id":9031,"sourceGame":"nationalEngine","q":"Refer to loanable funds. Saving shifts left and investment demand shifts right. What is guaranteed?","options":["The real interest rate rises","Investment rises","Investment falls","The real interest rate falls"],"a":0,"tag":"loanable_funds","type":"graph_integration","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"loanable_funds_graph_shifts","secondarySkills":["investment_demand_vs_saving_shift"],"repairSkill":"loanable_funds_graph_shifts","commonError":"claims_quantity_effect_when_ambiguous","feedback":"Both lower saving and higher investment demand push the real interest rate upward. Investment quantity is ambiguous.","image":"loanablefunds.png"},
{"id":9032,"sourceGame":"nationalEngine","q":"Refer to loanable funds. Saving shifts right and investment demand shifts left. What is guaranteed?","options":["The real interest rate falls","Investment rises","Investment falls","The real interest rate rises"],"a":0,"tag":"loanable_funds","type":"graph_integration","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"loanable_funds_graph_shifts","secondarySkills":["investment_demand_vs_saving_shift"],"repairSkill":"loanable_funds_graph_shifts","commonError":"claims_quantity_effect_when_ambiguous","feedback":"Higher saving lowers r, and lower investment demand also lowers r. Investment quantity is ambiguous.","image":"loanablefunds.png"},
{"id":9033,"sourceGame":"nationalEngine","q":"Refer to loanable funds. Saving shifts right and investment demand shifts right. What is guaranteed?","options":["Investment rises","The real interest rate rises","The real interest rate falls","Investment falls"],"a":0,"tag":"loanable_funds","type":"graph_integration","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"loanable_funds_graph_shifts","secondarySkills":["investment_demand_vs_saving_shift"],"repairSkill":"loanable_funds_graph_shifts","commonError":"claims_interest_rate_effect_when_ambiguous","feedback":"Both higher saving and higher investment demand raise equilibrium investment. The interest-rate effect is ambiguous.","image":"loanablefunds.png"},
{"id":9034,"sourceGame":"nationalEngine","q":"National saving is fixed at 1000. Investment demand is I = 1800 - 100r. What is equilibrium r?","options":["8","10","6","18"],"a":0,"tag":"loanable_funds","type":"calculation","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"saving_investment_equilibrium","secondarySkills":["real_interest_investment_calculation"],"repairSkill":"saving_investment_equilibrium","commonError":"does_not_set_s_equal_to_i","feedback":"Set 1000 = 1800 - 100r. Then 100r = 800, so r = 8."},
{"id":9035,"sourceGame":"nationalEngine","q":"Saving rises from 900 to 1100. Investment demand is I = 1700 - 100r. What happens to r?","options":["It falls from 8 to 6","It rises from 6 to 8","It falls from 9 to 7","It stays at 8"],"a":0,"tag":"loanable_funds","type":"calculation","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"saving_investment_equilibrium","secondarySkills":["loanable_funds_graph_shifts"],"repairSkill":"saving_investment_equilibrium","commonError":"gets_saving_effect_on_r_backward","feedback":"At S = 900, r = 8. At S = 1100, r = 6. Higher saving lowers r."},
{"id":9036,"sourceGame":"nationalEngine","q":"Investment demand rises after a productivity boom, but saving is vertical and fixed. Which policy would let investment actually rise more?","options":["Raise national saving","Cut national saving","Raise consumption at every income","Increase the deficit"],"a":0,"tag":"loanable_funds","type":"policy","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"investment_demand_vs_saving_shift","secondarySkills":["loanable_funds_graph_shifts"],"repairSkill":"investment_demand_vs_saving_shift","commonError":"misses_saving_constraint","feedback":"If saving is fixed, higher investment demand mostly raises r. More national saving shifts funds outward and allows more investment."},
{"id":9037,"sourceGame":"nationalEngine","q":"A deficit raises r and lowers investment. Why is the long-run concern not mainly current GDP in Chapter 3?","options":["Lower investment reduces future capital accumulation","Current GDP must fall immediately","CPI must rise faster than GDP","Unemployment must equal the natural rate"],"a":0,"tag":"crowding_out","type":"policy","objective":"LO3.5","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"fiscal_policy_crowding_out","secondarySkills":["production_function_output"],"repairSkill":"fiscal_policy_crowding_out","commonError":"misses_future_capital_channel","feedback":"Output is fixed in the current Chapter 3 model, but lower investment can reduce future capital and future output."},
{"id":9038,"sourceGame":"nationalEngine","q":"Actual unemployment is 8.4%. Frictional is 2.1%, structural is 3.7%. A matching reform lowers frictional unemployment by 0.6 point. What is the new natural rate?","options":["5.2%","5.8%","2.0%","8.4%"],"a":0,"tag":"natural_rate","type":"multi-step","objective":"LO7.1","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"natural_rate_definition","secondarySkills":["sectoral_shift_matching"],"repairSkill":"natural_rate_definition","commonError":"uses_actual_unemployment_or_forgets_natural_rate_components","feedback":"The original natural rate is 2.1 + 3.7 = 5.8%. Lowering frictional unemployment by 0.6 makes the new natural rate 5.2%."},
{"id":9039,"sourceGame":"nationalEngine","q":"Actual unemployment falls below the natural rate after a demand boom. Which claim is weakest?","options":["The natural rate has permanently fallen","The economy may be temporarily hot","Cyclical unemployment may be negative","Frictional unemployment still exists"],"a":0,"tag":"natural_rate","type":"trap","objective":"LO7.1","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"natural_rate_definition","secondarySkills":[],"repairSkill":"natural_rate_definition","commonError":"confuses_actual_unemployment_with_natural_rate","feedback":"Actual unemployment below the natural rate does not prove the natural rate has permanently changed."},
{"id":9040,"sourceGame":"nationalEngine","q":"A policy improves matching, reduces wage rigidity, and leaves aggregate demand unchanged. Which memo best explains the likely unemployment effect?","options":["The natural rate falls because frictional and structural unemployment fall","Only cyclical unemployment falls because aggregate demand is unchanged","The natural rate rises because any labor-market reform raises separations","Unemployment cannot change because GDP measurement rules are fixed"],"a":0,"tag":"natural_rate","type":"policy","objective":"LO7.1","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"natural_rate_definition","secondarySkills":["frictional_vs_other_unemployment"],"repairSkill":"natural_rate_definition","commonError":"misses_natural_rate_components_or_confuses_demand_policy","feedback":"Better matching lowers frictional unemployment, and less wage rigidity lowers structural unemployment. Both reduce the natural rate."},
{"id":9041,"sourceGame":"nationalEngine","q":"If s = 0.06 and f = 0.24, steady-state unemployment is 20%. If f rises to 0.34 while s stays fixed, what happens?","options":["It falls to 15%","It rises to 25%","It stays at 20%","It falls to 6%"],"a":0,"tag":"steady_state_unemployment","type":"multi-step","objective":"LO7.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"steady_state_unemployment_calculation","secondarySkills":["job_finding_job_separation_logic"],"repairSkill":"steady_state_unemployment_calculation","commonError":"gets_finding_rate_effect_backward_or_uses_s_as_rate","feedback":"New steady-state unemployment is 0.06/(0.06+0.34) = 0.15, or 15%. A higher job-finding rate lowers unemployment."},
{"id":9042,"sourceGame":"nationalEngine","q":"Steady-state unemployment is 10% and f = 0.45. What is s?","options":["0.05","0.10","0.40","0.45"],"a":0,"tag":"steady_state_unemployment","type":"calculation","objective":"LO7.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"steady_state_unemployment_calculation","secondarySkills":[],"repairSkill":"steady_state_unemployment_calculation","commonError":"cannot_solve_for_s","feedback":"Using s = uf/(1-u), s = 0.10×0.45/0.90 = 0.05."},
{"id":9043,"sourceGame":"nationalEngine","q":"A policy raises f from 0.20 to 0.30 and raises s from 0.04 to 0.06. What happens to steady-state unemployment?","options":["It stays at 16.7%","It rises from 16.7% to 20.0%","It falls from 20.0% to 16.7%","It rises from 4.0% to 6.0%"],"a":0,"tag":"steady_state_unemployment","type":"multi-step","objective":"LO7.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"job_finding_job_separation_logic","secondarySkills":["steady_state_unemployment_calculation"],"repairSkill":"job_finding_job_separation_logic","commonError":"focuses_on_one_flow_rate_only","feedback":"Initial u = 0.04/0.24 = 16.7%. New u = 0.06/0.36 = 16.7%. Both rates rose proportionally."},
{"id":9044,"sourceGame":"nationalEngine","q":"If s falls from 0.05 to 0.03 and f falls from 0.25 to 0.15, what happens to steady-state unemployment?","options":["It stays at 16.7% but turnover slows","It falls to 10.0% and turnover slows","It rises to 20.0% and turnover speeds up","It stays at 16.7% but turnover speeds up"],"a":0,"tag":"steady_state_unemployment","type":"multi-step","objective":"LO7.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"job_finding_job_separation_logic","secondarySkills":["steady_state_unemployment_calculation"],"repairSkill":"job_finding_job_separation_logic","commonError":"ignores_flow_speed_vs_rate_ratio","feedback":"Both rates fall proportionally, so u stays 16.7%, but flows in and out of unemployment slow."},
{"id":9045,"sourceGame":"nationalEngine","q":"A policy lowers s but also lowers f. Which conclusion is safest?","options":["The unemployment-rate effect is ambiguous","Unemployment must fall","Unemployment must rise","The natural rate becomes zero"],"a":0,"tag":"steady_state_unemployment","type":"policy","objective":"LO7.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"job_finding_job_separation_logic","secondarySkills":[],"repairSkill":"job_finding_job_separation_logic","commonError":"focuses_on_one_rate_in_two_rate_model","feedback":"Lower s reduces unemployment, but lower f raises it. The net effect depends on magnitudes."},
{"id":9046,"sourceGame":"nationalEngine","q":"A retraining program raises f, while experience-rated UI lowers s. What happens to steady-state unemployment?","options":["It falls through both channels","It rises through both channels","It is ambiguous because both affect u oppositely","It stays fixed because L is fixed"],"a":0,"tag":"steady_state_unemployment","type":"policy","objective":"LO7.2","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"job_finding_job_separation_logic","secondarySkills":["sectoral_shift_matching"],"repairSkill":"job_finding_job_separation_logic","commonError":"misses_direction_of_f_and_s_policy","feedback":"Higher f and lower s both reduce steady-state unemployment."},
{"id":9047,"sourceGame":"nationalEngine","q":"Refer to the minimum wage graph. A wage floor rises above equilibrium, but firms cut hours rather than workers. What should the best answer note?","options":["Labor-cost adjustment can occur through hours, hiring, and benefits","No structural pressure exists unless headcount falls","The wage floor shifts labor demand right","The policy only changes CPI measurement"],"a":0,"tag":"minimum_wage","type":"policy","objective":"LO7.3","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"minimum_wage_structural_unemployment","secondarySkills":["wage_rigidity_structural_unemployment"],"repairSkill":"minimum_wage_structural_unemployment","commonError":"looks_only_at_headcount_effects","feedback":"A binding wage floor can affect hours, hiring, benefits, prices, and job availability, not only headcount.","image":"minimumwage.png"},
{"id":9048,"sourceGame":"nationalEngine","q":"A firm pays above-market wages to reduce turnover and discourage shirking. What is the cleanest interpretation?","options":["Efficiency wages can improve retention and effort but may ration jobs","Efficiency wages eliminate structural unemployment","Efficiency wages only affect CPI calculation","Efficiency wages lower real wages by definition"],"a":0,"tag":"efficiency_wages","type":"integration","objective":"LO7.3","difficulty":"legendary","conceptCluster":"legendary_national_engine","primarySkill":"efficiency_wage_theory","secondarySkills":["wage_rigidity_structural_unemployment"],"repairSkill":"efficiency_wage_theory","commonError":"ignores_job_rationing_tradeoff","feedback":"Efficiency wages may reduce turnover and shirking, but above-equilibrium wages can also create job rationing."},
