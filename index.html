GAUNTLET ENGINE — MASTER TEMPLATE

READ BEFORE EDITING:

This file is divided into TWO zones:

1. SAFE TO EDIT (Customization)
   - Question banks
   - Boss names/images
   - Text (wizard, areas, artifacts)
   - Visual themes

2. DO NOT TOUCH (Core Engine)
   - Adaptive logic
   - Question selection system
   - Progression rules
   - Boss mechanics

If you modify the engine without understanding it,
you WILL break the game.

If something breaks, check:
- Question IDs are unique
- Each question has: q, options, a, tag, type, feedback
- Tags/types are consistent

=====================================================
QUICK EDIT GUIDE (READ THIS FIRST)

If you are customizing this game, start here:

MAIN EDIT ZONES:
1. Question Banks (scroll to "QUESTION BANKS")
2. Artifact Names & Images
3. Wizard Name & Image
4. Game Title + Text

LAYOUT / STYLE EDITS:
- Colors, fonts, spacing → SAFE
- Layout structure → USE CAUTION

DO NOT TOUCH:
- Adaptive engine
- Question selection logic
- IDs used in JavaScript

If you break something:
→ Check IDs first
→ Then check question format

===================================================== -->

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
    
<!-- Title can be changed to whatever the game needs -->
<title>The National Engine</title>
   
<style>
/* =========================================
   1. VISUAL DESIGN — SAFE TO EDIT

You can change:
- Colors
- Background images
- Fonts
- Glow effects

Do NOT rename IDs (#gameBox, #mazeTrack, etc.)
or you will break JavaScript connections.
========================================= */
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow-x: hidden;
    color: #f3ead2;

    background: url('question_background_image.png');
    background-size: cover;
    background-position: center;
}
    
.dungeon-container {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 40px;
    width: 100%;
    max-width: 1100px;
    margin-top: 20px;
}

.start-content{
  width: 100%;
  max-width: 420px;
  display:flex;
  flex-direction:column;
  align-items:center;   
  text-align:center;    
}

.title{
  font-size:64px;
  letter-spacing:4px;
  margin-bottom:10px;
  color:#f4d58d;
  text-align:center;
  text-shadow:
    0 0 14px rgba(214,177,92,0.85),
    0 0 34px rgba(180,83,9,0.55),
    0 3px 8px rgba(0,0,0,0.9);
}

.subtitle{
  font-size:34px;
  margin-bottom:35px;
  letter-spacing:2px;
  text-align:center;
  color:#b98746;
  text-shadow:
    0 0 10px rgba(185,135,70,0.45),
    0 2px 6px rgba(0,0,0,0.85);
}

.tagline{
  margin-bottom:30px;
  font-style:italic;
  opacity:0.88;
  text-align:center;
  color:#d8c7a0;
  text-shadow: 0 2px 6px rgba(0,0,0,0.85);
}

.name-input{
  width:100%;
  max-width:320px;
  text-align:center;
  padding:15px;
  border-radius:10px;
  border:1px solid rgba(214,177,92,0.45);   
  background: rgba(12,18,18,0.88);          
  color:#f3ead2;                             
  font-size:20px;
  margin-bottom:20px;
  outline:none;
  box-shadow:
    0 0 14px rgba(214,177,92,0.28),
    inset 0 0 12px rgba(0,0,0,0.65);  
}

.name-input:focus{
  border-color: rgba(240,199,94,0.75);
  box-shadow:
    0 0 18px rgba(240,199,94,0.45),
    0 0 32px rgba(100,36,24,0.35),
    inset 0 0 12px rgba(0,0,0,0.75);
}

.start-btn{
  width:100%;
  max-width:320px;
}
	
#emailInput::placeholder,
#username::placeholder{
    color: rgba(216,199,160,0.52);
    font-style: italic;
    letter-spacing: 0.5px;
    text-align: center;
}
   
/* =========================================
   2. CORE GAME CONTAINER (#gameBox) — SAFE TO STYLE
========================================= */

#gameBox {
    max-width: 750px;
    flex:1;
    min-width:0;
    width:100%;
    margin: 0;
    padding: 18px 20px;
    text-align: center;

    background: radial-gradient(circle at center,
        rgba(42,74,64,0.34) 0%,
        rgba(18,24,24,0.92) 52%,
        rgba(4,5,5,0.98) 100%);

    backdrop-filter: blur(6px);
    border-radius: 14px;
    box-sizing: border-box;

    box-shadow:
        0 0 24px rgba(214,177,92,0.24),
        0 0 70px rgba(88,28,24,0.28),
        inset 0 0 38px rgba(0,0,0,0.72);

    border: 1px solid rgba(214,177,92,0.34);
    animation: torchFlicker 6s infinite;
    transition: box-shadow .3s ease, border-color .3s ease;
    position: relative;
}

/* Boss state styling — triggered during boss fights (DO NOT REMOVE) */
#gameBox.boss-mode {
    border: 2px solid #d6b15c;
    box-shadow:
        0 0 32px rgba(214,177,92,0.58),
        0 0 64px rgba(100,36,24,0.48),
        inset 0 0 42px rgba(0,0,0,0.78);
}

.boss-icon{
    width: 28px;
    height: 28px;
    object-fit: contain;
    pointer-events: none;
}

/* Tier 1 — Registrar of False Measures */
.boss10 .boss-icon{
    filter:
        drop-shadow(0 0 6px rgba(214,177,92,0.85))
        drop-shadow(0 0 12px rgba(65,95,78,0.55));
}

/* Tier 2 — Warden of Labor Flows */
.boss20 .boss-icon{
    filter:
        drop-shadow(0 0 8px rgba(196,106,58,0.9))
        drop-shadow(0 0 16px rgba(99,35,24,0.65));
}

/* Tier 3 — Comptroller of Equilibrium */
.boss30 .boss-icon{
    filter:
        drop-shadow(0 0 10px rgba(240,199,94,1))
        drop-shadow(0 0 24px rgba(127,29,29,0.85));
}

/* Damage effect when boss/player is hit (visual feedback) */
.hit {
    box-shadow:
        0 0 60px rgba(127,29,29,0.95),
        0 0 28px rgba(240,199,94,0.35),
        inset 0 0 42px rgba(88,28,24,0.85) !important;
    animation: hitshake 0.4s ease;
}

/* Autosave indicator — positioned relative to gameBox */
#autosave {
    position: absolute;
    top: 15px;
    right: 15px;
    font-size: 11px;
    opacity: 0.48;
    font-style: italic;
    color: #d8c7a0;
    text-shadow: 0 0 6px rgba(214,177,92,0.35);
}

/* Adds a graph box for questions with graphs */
#questionImageBox{
  margin: 0 auto 12px auto;
  text-align: center;
  display: none;
}

#questionImageBox img{
  max-width: 100%;
  width: 420px;
  height: auto;
  border-radius: 10px;
  border: 1px solid rgba(214,177,92,0.22);
  box-shadow:
    0 0 14px rgba(214,177,92,0.16),
    0 0 28px rgba(0,0,0,0.65);
}

/* =========================================
   3. TEXT & TYPOGRAPHY SYSTEM — SAFE TO CUSTOMIZE
========================================= */

h2 {
    text-shadow:
        0 0 10px rgba(244,213,141,0.24),
        0 0 20px rgba(214,177,92,0.22),
        0 2px 6px rgba(0,0,0,0.85);
    margin-bottom: 5px;
}

/* Main question text — keep readable and centered */
#question {
    font-size: clamp(20px, 4vw, 22px);
    line-height: 1.4;
    font-weight: 600;
    margin: 14px 0;
    color: #f3ead2;
    text-shadow:
        0 2px 5px rgba(0,0,0,0.85),
        0 0 8px rgba(214,177,92,0.12);
}

/* Boss/summary title — high emphasis text */
.boss-title {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 15px;
    display: block;
    color: #f4d58d;
    text-shadow:
        0 0 10px rgba(240,199,94,0.62),
        0 0 26px rgba(127,29,29,0.42),
        0 3px 8px rgba(0,0,0,0.9);
}

/* Area/zone label — subtle contextual info */
.area-title {
    color: #b9a879;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 15px;
    text-shadow:
        0 0 8px rgba(214,177,92,0.18),
        0 2px 5px rgba(0,0,0,0.85);
}

/* Boss summary text — left-aligned for readability */
.boss-q {
    font-style: normal;
    line-height: 1.5;
    font-size: 24px;
    border-left: 3px solid #8a3a24;
    padding-left: 15px;
    margin: 20px 0;
    text-align: left;
    color: #f3ead2;
    box-shadow: -4px 0 12px rgba(127,29,29,0.34);
    text-shadow: 0 2px 5px rgba(0,0,0,0.8);
}

/* Optional hint display (calculation or guidance) */
.hint-box {
    font-size: 13px;
    color: #d6b15c;
    margin-top: 15px;
    opacity: 0.82;
    height: 18px;
    text-shadow: 0 0 6px rgba(214,177,92,0.25);
}
    
/* Temporary feedback text (auto fades out) */
.fade-out-text {
    animation: fadeOut 5s forwards;
    font-weight: bold;
    color: #f0c75e;
    text-shadow:
        0 0 8px rgba(240,199,94,0.55),
        0 2px 5px rgba(0,0,0,0.85);
}

/* Add styling to Auditor text */
#message {
    margin-top: 10px;
    font-style: italic;
    letter-spacing: 0.5px;
    text-align: center;
    color: #d8c7a0;
    opacity: 0.9;
    text-shadow:
        0 0 7px rgba(214,177,92,0.18),
        0 2px 5px rgba(0,0,0,0.85);
}

/* National Engine override */
.national-engine #message {
    color: #d6b15c;
    font-size: 17px;
    font-style: italic;
    margin-top: 12px;
    margin-bottom: 6px;
    font-weight: 600;
    letter-spacing: 1px;
    text-shadow:
        0 0 8px rgba(214,177,92,0.42),
        0 0 18px rgba(100,36,24,0.25),
        0 2px 6px rgba(0,0,0,0.85);
}
   
/* =========================================
   4. BUTTONS & INTERACTION — SAFE TO CUSTOMIZE
========================================= */

/* Base button styling — applies to all buttons */
button {
    padding: 12px 22px;
    margin: 6px;
    font-size: 16px;
    cursor: pointer;

    background: linear-gradient(180deg, #5b3a1f, #1b1711);
    color: #f3ead2;

    border: 1px solid rgba(214,177,92,0.42);
    border-radius: 8px;

    box-shadow:
       0 0 12px rgba(214,177,92,0.24),
       0 0 24px rgba(88,28,24,0.18),
       inset 0 0 10px rgba(0,0,0,0.62);

    transition: all 0.15s ease;
}

/* Hover feedback — improves interactivity */
button:hover {
    background: linear-gradient(180deg, #7a4a25, #2a1b12);
    border-color: rgba(240,199,94,0.7);

    box-shadow:
        0 0 18px rgba(240,199,94,0.48),
        0 0 34px rgba(127,29,29,0.28),
        inset 0 0 12px rgba(0,0,0,0.68);

    transform: translateY(-2px) scale(1.02);
}

/* Click feedback — simulates button press */
button:active {
    transform: scale(0.96);
}

/* Answer container — controls layout of choices */
.answers {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 12px;
    width: 100%;
}

/* Individual answer buttons — flexible sizing */
.answers button {
    flex: 1 1 100%;
    min-height: 60px;
    max-width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 0;

    background: linear-gradient(180deg,
        rgba(55,70,58,0.96),
        rgba(12,18,18,0.98));

    color: #f3ead2;
    border: 1px solid rgba(214,177,92,0.34);

    box-shadow:
        0 0 10px rgba(214,177,92,0.16),
        inset 0 0 14px rgba(0,0,0,0.7);
}

/* Answer hover — a little brighter than base */
.answers button:hover {
    background: linear-gradient(180deg,
        rgba(73,92,72,0.98),
        rgba(31,40,34,0.98));

    border-color: rgba(240,199,94,0.68);

    box-shadow:
        0 0 18px rgba(214,177,92,0.38),
        0 0 32px rgba(65,95,78,0.22),
        inset 0 0 14px rgba(0,0,0,0.68);
}

/* Utility button (fullscreen toggle) — safe to restyle or move */
.fullscreenBtn {
    position: absolute;
    top: 12px;
    left: 12px;

    padding: 6px 12px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;

    color: #f3ead2;
    background: linear-gradient(180deg, #4a3320, #11100d);

    border: 1px solid rgba(214,177,92,0.34);
    border-radius: 6px;
    cursor: pointer;

    box-shadow:
        0 0 10px rgba(214,177,92,0.22),
        inset 0 0 7px rgba(0,0,0,0.72);

    transition: all 0.15s ease;
}

.fullscreenBtn:hover {
    background: linear-gradient(180deg, #6a4726, #1c1510);
    border-color: rgba(240,199,94,0.62);

    box-shadow:
        0 0 16px rgba(214,177,92,0.42),
        inset 0 0 8px rgba(0,0,0,0.72);
}

.fullscreenBtn:active {
    transform: scale(0.95);
    box-shadow:
        0 0 8px rgba(214,177,92,0.28),
        inset 0 0 10px rgba(0,0,0,0.85);
}

.continue-btn {
    background: linear-gradient(180deg, #8a4f25, #3a1f14);
    color: #f3ead2;
    font-weight: bold;

    padding: 14px 40px;
    font-size: 18px;
    border-radius: 8px;

    border: 1px solid rgba(240,199,94,0.52);
    cursor: pointer;

    box-shadow:
        0 0 16px rgba(214,177,92,0.38),
        0 0 34px rgba(127,29,29,0.28),
        inset 0 0 12px rgba(0,0,0,0.65);

    transition: all 0.15s ease;
}

.continue-btn:hover {
    background: linear-gradient(180deg, #a7632c, #5b2a19);

    box-shadow:
        0 0 24px rgba(240,199,94,0.58),
        0 0 42px rgba(127,29,29,0.36),
        inset 0 0 12px rgba(0,0,0,0.65);

    transform: scale(1.03);
}

#continueBtn:active {
    transform: scale(0.97);
    box-shadow:
        0 0 10px rgba(214,177,92,0.28),
        inset 0 0 10px rgba(0,0,0,0.75);
}

/* =========================================
   5. PROGRESS & MAZE TRACK — SAFE TO CUSTOMIZE (WITH RULES)
========================================= */
    
/* Progress bar container — background track */
#progressBar {
    width: 100%;
    height: 22px;

    background: linear-gradient(180deg,
        rgba(12,18,18,0.95),
        rgba(4,5,5,0.98));

    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;

    border: 1px solid rgba(214,177,92,0.22);

    box-shadow:
        inset 0 0 12px rgba(0,0,0,0.82),
        0 0 10px rgba(214,177,92,0.12);
}
    
/* Progress fill — width controlled by JS */
#progressFill {
    height: 100%;
    width: 0%;

    background: linear-gradient(90deg,
        #2f4f43,
        #d6b15c,
        #8a3a24);

    box-shadow:
        0 0 12px rgba(214,177,92,0.45),
        0 0 22px rgba(127,29,29,0.25);

    transition: width 0.4s ease;
}

/* Maze grid layout — 10 columns = 30 total rooms */
#mazeTrack {
    display: grid;
    grid-template-columns: repeat(10, 36px);
    justify-content: center;
    gap: 10px;
    margin: 25px auto;
}
    
/* Individual room cell — default state */
.maze-box {
    width: 36px;
    height: 36px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 20px;
    border-radius: 6px;

    background: linear-gradient(180deg,
        rgba(22,30,28,0.72),
        rgba(7,9,9,0.86));

    border: 1px solid rgba(214,177,92,0.18);

    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.72),
        0 0 5px rgba(214,177,92,0.08);

    transition: all 0.3s ease;
}

/* Current room highlight — animated pulse */
.maze-box.active {
    background: radial-gradient(circle,
        rgba(214,177,92,0.48),
        rgba(65,95,78,0.36),
        rgba(12,18,18,0.92));

    border: 2px solid #f0c75e;

    box-shadow:
        0 0 12px rgba(240,199,94,0.78),
        0 0 24px rgba(214,177,92,0.48),
        inset 0 0 12px rgba(0,0,0,0.62);

    z-index: 10;
    animation: activePulse 1s infinite alternate;
}

/* Completed tile */
.maze-box.completed {
    background: linear-gradient(180deg,
        rgba(65,95,78,0.62),
        rgba(20,31,28,0.88));

    border-color: rgba(214,177,92,0.38);

    box-shadow:
        0 0 8px rgba(214,177,92,0.28),
        inset 0 0 10px rgba(0,0,0,0.7);
}

/* Boss room highlights (10, 20, 30) — visual only */
.maze-box:nth-child(10) {
    text-shadow:
        0 0 8px #d6b15c,
        0 0 18px rgba(65,95,78,0.8);
}

.maze-box:nth-child(20) {
    text-shadow:
        0 0 8px #c46a3a,
        0 0 18px rgba(127,29,29,0.75);
}

.maze-box:nth-child(30) {
    text-shadow:
        0 0 10px #f0c75e,
        0 0 24px rgba(127,29,29,0.95),
        0 0 34px rgba(214,177,92,0.42);
}

/* Streak styling — National Engine */
.streak {
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    letter-spacing:0.5px;
    color: rgba(243,234,210,0.94);
    text-shadow:
        0 0 7px rgba(214,177,92,0.32),
        0 2px 5px rgba(0,0,0,0.85);
}

.streak-icon {
    width:22px;
    height:22px;
    object-fit:contain;
    border-radius:50%;

    filter:
        drop-shadow(0 0 8px rgba(214,177,92,0.75))
        drop-shadow(0 0 15px rgba(100,36,24,0.52));

    background: radial-gradient(circle,
        rgba(240,199,94,0.46) 0%,
        rgba(65,95,78,0.34) 45%,
        transparent 72%);

    animation: pulseControl 2.2s ease-in-out infinite;
}
   
/* =========================================
   6. ARTIFACT SYSTEM (REWARDS) — SAFE TO CUSTOMIZE
========================================= */
    
/* Reward popup — appears after boss victory */
#artifactDrop {
    margin-top: 20px;
    padding: 14px;

    background: radial-gradient(circle at center,
        rgba(65,95,78,0.34),
        rgba(12,18,18,0.96) 62%,
        rgba(4,5,5,0.98));

    border-radius: 10px;
    border: 1px solid rgba(214,177,92,0.34);

    box-shadow:
        0 0 22px rgba(214,177,92,0.28),
        0 0 42px rgba(127,29,29,0.22),
        inset 0 0 28px rgba(0,0,0,0.76);

    text-align: center;
}
    
/* Artifact image in popup */
#artifactImage {
    width: 96px;
    margin-bottom: 8px;
}

#artifactDrop img {
    filter:
        drop-shadow(0 0 14px rgba(240,199,94,0.82))
        drop-shadow(0 0 26px rgba(127,29,29,0.42));
}

/* Persistent artifact collection display (top panel) */
#artifactVault {
    margin-top: -6px;
    width: 220px;
    padding: 18px;
    border-radius: 12px;

    background: radial-gradient(circle at top,
        rgba(65,95,78,0.42),
        rgba(12,18,18,0.96) 58%,
        rgba(4,5,5,0.98));

    border: 1px solid rgba(214,177,92,0.3);

    box-shadow:
        0 0 20px rgba(214,177,92,0.22),
        0 0 38px rgba(88,28,24,0.20),
        inset 0 0 30px rgba(0,0,0,0.76);

    text-align: center;
}

#artifactVault h3 {
    color: #f4d58d;
    text-shadow:
        0 0 10px rgba(214,177,92,0.52),
        0 2px 6px rgba(0,0,0,0.85);
}

/* Layout container for artifact slots */
.vaultRow {
    display: flex;
    justify-content: center;
    align-items:flex-end;
    gap: 15px;
    flex-wrap:wrap;
}

/* Individual artifact slot (default = locked state) */    
.artifactSlot {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    min-width: 70px;
    text-align:center;
    opacity: .26;

    transition: all .4s ease;
}

/* Locked artifact image (dimmed effect) */    
.artifactSlot img {
    width: 45px;
    margin-bottom:4px;

    filter:
        brightness(0.28)
        contrast(0.85)
        sepia(0.35);

    transition: all .4s ease;
}

/* Artifact label text */
.artifactSlot span {
    display: block;
    font-size: 13px;
    color: rgba(216,199,160,0.38);
    margin-top: 8px;
    line-height: 1.2;
}

/* Glow + animation for unlocked artifacts */
.artifactSlot.unlocked {
    opacity: 1;
    transform: scale(1.05);
}

.artifactSlot.unlocked img {
    filter:
        drop-shadow(0 0 14px rgba(240,199,94,0.86))
        drop-shadow(0 0 26px rgba(214,177,92,0.46))
        drop-shadow(0 0 34px rgba(127,29,29,0.24));

    animation: relicPulse 2.5s ease-in-out infinite;
    backface-visibility: hidden;
    transform: translateZ(0);
}

.artifactSlot.unlocked span {
    color: #f3ead2;
    font-weight: 600;
    text-shadow:
        0 0 7px rgba(214,177,92,0.38),
        0 2px 5px rgba(0,0,0,0.85);
}

/* =========================================
   7. BOSS EFFECTS & ATMOSPHERE — SAFE TO CUSTOMIZE
========================================= */
    
/* Hit animation — triggered when boss takes damage */
.boss-shake {
    animation: bossShake 0.5s cubic-bezier(.36,.07,.19,.97) both;
}

/* Boss image display — includes floating animation */
.bossIcon {
    width: 96px;
    height: auto;
    display: block;
    margin: 0 auto 12px auto;
    animation: bossFloat 4s ease-in-out infinite;
}

/* Boss-specific glow effects */
.registrarGlow {
    filter:
        drop-shadow(0 0 12px rgba(214,177,92,0.82))
        drop-shadow(0 0 24px rgba(65,95,78,0.50))
        drop-shadow(0 0 34px rgba(0,0,0,0.75));
}

.wardenGlow {

/* =========================================
   9. ANIMATION SYSTEM — SAFE TO CUSTOMIZE (WITH CARE)
========================================= */

/* Ambient lighting effect (environmental immersion) */    
@keyframes torchFlicker {
  0%, 100% {
    filter: brightness(1);
  }
  25% {
    filter: brightness(1.05) saturate(1.04);
  }
  50% {
    filter: brightness(0.96) saturate(0.98);
  }
  75% {
    filter: brightness(1.04) saturate(1.03);
  }
}

/* Damage feedback (quick impact effect) */    
@keyframes hitshake {
  0% {
    transform: translateX(0);
  }
  25% {
    transform: translateX(-8px);
  }
  50% {
    transform: translateX(8px);
  }
  75% {
    transform: translateX(-6px);
  }
  100% {
    transform: translateX(0);
  }
}

/* Boss-specific hit feedback (stronger shake) */    
@keyframes bossShake {
  10%, 90% {
    transform: translate3d(-1px, 0, 0);
  }
  20%, 80% {
    transform: translate3d(2px, 0, 0);
  }
  30%, 50%, 70% {
    transform: translate3d(-4px, 0, 0);
  }
  40%, 60% {
    transform: translate3d(4px, 0, 0);
  }
}

/* Current room highlight animation (maze tracker) */   
@keyframes activePulse {
  0% {
    transform: scale(1.06);
    box-shadow:
      0 0 8px rgba(214,177,92,0.68),
      inset 0 0 10px rgba(0,0,0,0.6);
  }

  45% {
    transform: scale(1.13);
    box-shadow:
      0 0 18px rgba(240,199,94,0.92),
      0 0 32px rgba(214,177,92,0.48),
      0 0 42px rgba(65,95,78,0.24),
      inset 0 0 12px rgba(0,0,0,0.64);
  }

  70% {
    transform: scale(1.09);
    box-shadow:
      0 0 12px rgba(214,177,92,0.78),
      0 0 24px rgba(127,29,29,0.24),
      inset 0 0 11px rgba(0,0,0,0.64);
  }

  100% {
    transform: scale(1.11);
    box-shadow:
      0 0 15px rgba(240,199,94,0.72),
      0 0 30px rgba(214,177,92,0.36),
      inset 0 0 12px rgba(0,0,0,0.68);
  }
}

/* Victory text animation (end screen emphasis) */    
@keyframes victoryGlow {
  0%, 100% {
    transform: scale(1);
    text-shadow:
      0 0 10px rgba(240,199,94,0.72),
      0 2px 6px rgba(0,0,0,0.9);
  }

  50% {
    transform: scale(1.08);
    text-shadow:
      0 0 24px rgba(240,199,94,0.95),
      0 0 42px rgba(214,177,92,0.62),
      0 0 52px rgba(127,29,29,0.36),
      0 3px 8px rgba(0,0,0,0.9);
  }
}

/* Idle boss movement (subtle hovering effect) */    
@keyframes bossFloat {
  0%, 100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-6px);
  }
}

/* Temporary feedback text fade-out */   
@keyframes fadeOut {
  0%, 70% {
    opacity: 1;
  }

  100% {
    opacity: 0;
  }
}

/* Wizard idle animation (subtle movement) */

  0%,100% {
    transform: translateY(0);
  }

    transform: translateY(-5px);
  }
}

/* General UI entrance animation */

  from {
    opacity: 0;
    transform: translateY(8px);
  }

    opacity: 1;
    transform: translateY(0);
  }

function generatePseudonymFromEmail(email) {
    const adjectives = [
        "Iron", "Crimson", "Silent", "Golden", "Shadow", "Blazing",
        "Stone", "Storm", "Obsidian", "Frost", "Ember", "Steel"
    ];

    const nouns = [
        "Anvil", "Hammer", "Falcon", "Forge", "Sentinel", "Warden",
        "Cipher", "Titan", "Raven", "Vanguard", "Crown", "Engine"
    ];

    let hash = 0;
    const cleanEmail = email.trim().toLowerCase();

    for (let i = 0; i < cleanEmail.length; i++) {
        hash = ((hash << 5) - hash) + cleanEmail.charCodeAt(i);
        hash |= 0;
    }

    const positiveHash = Math.abs(hash);

    const adj = adjectives[positiveHash % adjectives.length];
    const noun = nouns[Math.floor(positiveHash / adjectives.length) % nouns.length];
    const number = 1000 + (positiveHash % 9000);

    return `${adj}${noun}${number}`;
}

const TYPE_TIME_TARGETS = {

function getTypeTargetMs(type){
    return TYPE_TIME_TARGETS[type] || TYPE_TIME_TARGETS.default;
}

function getTypePressure(type){
    if(["integration","multi-step"].includes(type)) return 1.2;
    if(["trap","interaction","calculation"].includes(type)) return 0.8;

function clamp(value, min, max){

function getTagBucket(tag){
    if(!tag) return null;
    if(!masteryState.byTag[tag]){
        masteryState.byTag[tag] = {
            attempts: 0,
            correct: 0,

        };

}

function getTypeBucket(tag, type){
    const tagBucket = getTagBucket(tag);

    if(!tagBucket.byType[key]){
        tagBucket.byType[key] = {

        };

function inferObjective(question){
    if(!question) return "general";
    if(question.objective) return question.objective;
    const q = (question.q || "").toLowerCase();
    const tag = question.tag || "general";
    const type = question.type || "default";

    if(tag === "production"){
        if(q.includes("isoquant")) return "isoquant_reading";
        if(q.includes("technical substitution") || q.includes("mrts")) return "mrts";
        if(q.includes("marginal product")) return "marginal_product";
        if(q.includes("substitut")) return "input_substitution";
        if(q.includes("returns to scale")) return "returns_to_scale";
        if(q.includes("technology")) return "technology_productivity";
    }
    if(tag === "costs"){
        if(q.includes("fixed cost")) return "fixed_vs_variable";
        if(q.includes("average total cost") || q.includes("atc")) return "atc_relationships";
        if(q.includes("average variable cost") || q.includes("avc")) return "shutdown_components";
        if(q.includes("marginal cost") || q.includes("mc")) return "mc_relationships";
        if(q.includes("wage") || q.includes("input prices")) return "cost_curve_shifts";
    }
    if(tag === "profit"){
        if(q.includes("shut down")) return "shutdown_rule";
        if(q.includes("profit maxim")) return "mr_mc_rule";
        if(q.includes("zero economic profit")) return "normal_profit";
        if(q.includes("loss")) return "profit_vs_loss";
    }
    if(tag === "competition"){
        if(q.includes("price taker") || q.includes("perfectly elastic")) return "price_taking";
        if(q.includes("supply curve")) return "firm_supply";
        if(q.includes("market price")) return "firm_vs_market_price";
    }
    if(tag === "market"){
        if(q.includes("entry")) return "entry_adjustment";
        if(q.includes("exit")) return "exit_adjustment";
        if(q.includes("long run equilibrium")) return "long_run_equilibrium";
        if(q.includes("demand")) return "market_shift_sequences";
    }
    if(tag === "efficiency"){
        if(q.includes("allocative")) return "allocative_efficiency";
        if(q.includes("productive")) return "productive_efficiency";
        if(q.includes("full efficiency")) return "combined_efficiency";
    }

    return `${tag}_${type}`;
}

function getObjectiveBucket(question){
    const objectiveKey = inferObjective(question);
    if(!masteryState.byObjective[objectiveKey]){
        masteryState.byObjective[objectiveKey] = {

            correct: 0,

function getObjectiveAccuracy(question){

function getObjectiveFluency(question){

function updateBucket(bucket, isCorrect, responseTime){
    if(!bucket) return;
    bucket.attempts++;
    if(isCorrect) bucket.correct++;
    bucket.avgTime = bucket.avgTime === 0
        ? responseTime
        : Math.round((bucket.avgTime * 0.7) + (responseTime * 0.3));
}

function getAccuracy(bucket){
    if(!bucket || !bucket.attempts) return null;
    return bucket.correct / bucket.attempts;
}

function getTimeRatio(bucket, type){
    if(!bucket || !bucket.attempts || !bucket.avgTime) return 1;
    return bucket.avgTime / getTypeTargetMs(type);
}

function getFluency(bucket, type){
    const acc = getAccuracy(bucket);
    if(acc === null) return 0;
    const timeRatio = getTimeRatio(bucket, type);
    return acc - clamp((timeRatio - 1) * 0.25, 0, 0.35);
}

function getTagAccuracy(tag){
    return getAccuracy(getTagBucket(tag));

function getTagTypeAccuracy(tag, type){

function recordAdaptiveAttempt(question, isCorrect, responseTime){
    if(!question || !question.tag) return;

    const tagBucket = getTagBucket(question.tag);
    const typeBucket = getTypeBucket(question.tag, question.type);
    const objectiveBucket = getObjectiveBucket(question);

    updateBucket(tagBucket, isCorrect, responseTime);
    updateBucket(typeBucket, isCorrect, responseTime);
    updateBucket(objectiveBucket, isCorrect, responseTime);

    masteryState.recent.push({
        correct: !!isCorrect,
        responseTime,
        tag: question.tag,
        type: question.type || "default",
        objective: currentQuestion.objective || inferObjective(currentQuestion)
    });

    if(masteryState.recent.length > 20){
        masteryState.recent.shift();
    }
}

function getRecentPerformance(windowSize = 8){
    const recent = masteryState.recent.slice(-windowSize);
    if(recent.length === 0){
        return { accuracy: 0, avgCorrectRatio: 1.2, count: 0 };
    }

    const correct = recent.filter(x => x.correct);
    const avgCorrectRatio = correct.length
        ? correct.reduce((sum, item) => sum + (item.responseTime / getTypeTargetMs(item.type)), 0) / correct.length
        : 2;

    return {
        accuracy: recent.filter(x => x.correct).length / recent.length,
        avgCorrectRatio,
        count: recent.length
    };
}

function getWeakestTag(){
    const entries = Object.keys(masteryState.byTag);

    if(entries.length === 0){
        const fallback = Object.entries(conceptMemory || {}).sort((a,b) => b[1]-a[1])[0];
        return fallback ? fallback[0] : null;
    }

    let weakestTag = null;
    let weakestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const weakness = (conceptMemory[tag] || 0) + (1 - (fluency ?? 0));

        if(weakness > weakestScore){
            weakestScore = weakness;
            weakestTag = tag;
        }
    });

    return weakestTag;
}

function getStrongestTag(){
    const entries = Object.keys(masteryState.byTag);
    if(entries.length === 0) return null;

    let strongestTag = null;
    let strongestScore = -Infinity;

    entries.forEach(tag => {
        const fluency = getTagFluency(tag);
        const strength = (fluency === null ? 0 : fluency) - ((conceptMemory[tag] || 0) * 0.15);
        if(strength > strongestScore){
            strongestScore = strength;
            strongestTag = tag;
        }
    });

    return strongestTag;
}

function planRemediation(question, responseTime){
    if(!question || !question.tag) return null;

    const expected = getTypeTargetMs(question.type);
    const objectiveBucket = getObjectiveBucket(question);
    const objectiveAccuracy = getAccuracy(objectiveBucket);
    const objectiveAttempts = objectiveBucket?.attempts || 0;
    const carelessMiss = responseTime < expected * 0.55 && (objectiveAccuracy === null || objectiveAccuracy >= 0.45);
    const repeatedObjectiveMiss = objectiveAttempts >= 2 && objectiveAccuracy !== null && objectiveAccuracy < 0.6;
    const slowStruggle = responseTime > expected * 1.2;

    return {
        active: true,
        stage: carelessMiss ? "bridge" : "repair",
        tag: question.tag,
        objective: currentQuestion.objective || inferObjective(currentQuestion),
        sourceType: question.type || "default",
        returnRoom: room,
        originQuestionId: question.id || null,
        careless: carelessMiss,
        repeatedObjectiveMiss,
        slowStruggle
    };
}

function getRemediationStageLabel(stage){
    if(stage === "repair") return "Concept Repair";
    if(stage === "bridge") return "Bridge Repair";

function getQuestionsMatchingNeed(pool, objectiveKey, tag, excludeIds = []){
    if(!Array.isArray(pool) || pool.length === 0) return [];

    let candidates = pool.filter(q => !excludeIds.includes(q.id));
    let objectiveMatches = candidates.filter(q => inferObjective(q) === objectiveKey);
    if(objectiveMatches.length > 0) return objectiveMatches;

    let tagMatches = candidates.filter(q => q.tag === tag);
    if(tagMatches.length > 0) return tagMatches;

    return candidates;
}

function getRetestPoolName(){
    if(room <= 9) return "easy";
    if(room <= 19) return "medium";
    if(room <= 25) return "hard";
    if(room <= 29) return "hard";
    return "elite";
}

function pickRemediationFromBank(poolName, objectiveKey, tag, purpose = "confirm"){
    const pool = questionBanks[poolName] || [];
    const recentIds = (questionHistory[poolName] || []).slice(-10);
    let candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, recentIds);

    if(candidates.length === 0){
        candidates = getQuestionsMatchingNeed(pool, objectiveKey, tag, []);
    }

    if(candidates.length === 0) return null;

    const picked = weightedPick(candidates, {
        mode: purpose === "challenge" ? "challenge" : "support",
        preferredTypes: purpose === "challenge" ? ELITE_PREFERRED_TYPES : [],
        purpose
    });

    if(!questionHistory[poolName]) questionHistory[poolName] = [];
    questionHistory[poolName].push(picked.id);
    if(questionHistory[poolName].length > 15) questionHistory[poolName].shift();

    if(picked.tag){
        tagHistory.push(picked.tag);
        if(tagHistory.length > 10) tagHistory.shift();
    }

    return picked;
}

function getRemediationQuestion(state){
    if(!state || !state.active) return null;

    const excludeIds = [state.originQuestionId].filter(Boolean);

    if(state.stage === "repair"){
        const repairPool = easyConceptPools[state.tag] || [];
        const repairCandidates = getQuestionsMatchingNeed(repairPool, state.objective, state.tag, excludeIds);
        if(repairCandidates.length > 0){
            return weightedPick(repairCandidates, { mode: "support", purpose: "repair" });
        }
    }

    if(state.stage === "bridge"){
        const bridgePool = mediumConceptPools[state.tag] || [];
        const bridgeCandidates = getQuestionsMatchingNeed(bridgePool, state.objective, state.tag, excludeIds);
        if(bridgeCandidates.length > 0){
            return weightedPick(bridgeCandidates, { mode: "support", purpose: "confirm" });
        }
    }

    const retestPoolName = getRetestPoolName();
    return pickRemediationFromBank(retestPoolName, state.objective, state.tag, state.stage === "retest" ? "challenge" : "confirm");
}

function weightedPick(pool, options = {}){
    const {
        mode = "support",
        preferredTypes = [],
        purpose = "diversify"
    } = options;

    let totalWeight = 0;

    let weights = pool.map(q => {
        let w = 1;
        const tagAccuracy = q.tag ? getTagAccuracy(q.tag) : null;
        const typeAccuracy = (q.tag && q.type) ? getTagTypeAccuracy(q.tag, q.type) : null;
        const objectiveAccuracy = getObjectiveAccuracy(q);
        const tagFluency = q.tag ? getTagFluency(q.tag) : 0;
        const typeFluency = (q.tag && q.type) ? getTagTypeFluency(q.tag, q.type) : 0;
        const objectiveFluency = getObjectiveFluency(q);
        const conceptWeakness = q.tag ? (conceptMemory[q.tag] || 0) : 0;

        let recentCount = tagHistory.filter(t => t === q.tag).length;

        if(mode === "challenge"){
            w += clamp(tagFluency || 0, 0, 1.2) * 0.9;
            w += clamp(typeFluency || 0, 0, 1.0) * 0.6;
            w += clamp(objectiveFluency || 0, 0, 1.0) * 0.5;
            w += getTypePressure(q.type || "default");
            if(preferredTypes.includes(q.type)) w += 1.1;
            if(purpose === "stretch") w += 0.8;
        } else {
            const tagNeed = tagAccuracy === null ? 0.45 : (1 - tagAccuracy);
            const typeNeed = typeAccuracy === null ? 0.35 : (1 - typeAccuracy);
            const objectiveNeed = objectiveAccuracy === null ? 0.35 : (1 - objectiveAccuracy);
            const slowPenalty = clamp((getTimeRatio(getTypeBucket(q.tag, q.type), q.type) - 1), 0, 1.2);

            w += Math.min(conceptWeakness, 2.2);
            w += tagNeed * 0.7;
            w += typeNeed * 0.55;
            w += objectiveNeed * 0.85;
            w += slowPenalty * 0.35;

            if(purpose === "repair" && objectiveNeed > 0.35) w += 0.9;
            if(purpose === "confirm" && typeNeed > 0.25) w += 0.5;
        }

        // Coverage boost
        if(recentCount === 0){
            w += purpose === "diversify" ? 0.7 : 0.4;
        }

        w = Math.min(w, mode === "challenge" ? 5.5 : 4.5);
        totalWeight += w;
        return { q, w };
    });

    let r = Math.random() * totalWeight;

    for(let item of weights){
        r -= item.w;
        if(r <= 0){
            return item.q;
        }
    }

    return weights[weights.length - 1].q;
}

function getAdaptiveQuestion(poolName, targetTag = null, options = {}){

    }

    if(picked.tag){

        if(tagHistory.length > 10){

        }
    }

    return picked;
}

// =============================================
// GAME INITIALIZATION — PARTIAL CUSTOMIZATION
// =============================================
// Runs when player starts a new game.
//
// Handles:
// - username setup
// - full game state reset
// - UI reveal (game, vault, torches)
// - restoring unlocked artifacts
// - starting music and timer
//
// ---------------------------------------------
// SAFE TO EDIT:
// - alert message text
// - vault item IDs (Index, Valve, Seal)
// - visual elements shown/hidden
//
// DO NOT MODIFY:
// - state reset variables (room, streak, etc.)
// - questionHistory structure
// - loadQuestion() call
//
// Breaking this WILL cause:
// - corrupted runs
// - incorrect scoring
// - progression bugs
// =============================================
function startGame() {
    let inputEmail = document.getElementById("emailInput").value.trim().toLowerCase();

    if (!inputEmail) {
        alert("An email is required to enter the Dominion.");
        return;
    }

    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!emailPattern.test(inputEmail)) {
        alert("Enter a valid email address.");
        return;
    }

    bossCheckpoint = 1;

    studentEmail = inputEmail;
    username = generatePseudonymFromEmail(studentEmail);

    runID = `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;

    localStorage.setItem("gauntletEmail", studentEmail);
    localStorage.setItem("gauntletUser", username);
    localStorage.setItem("gauntletRunID", runID);

    sendGameData({
        runID: runID,
        game: "The National Engine",
        event: "start",
        user: username,
        email: studentEmail
    });

// =============================================
// RESET CORE GAME STATE — DO NOT MODIFY STRUCTURE
// =============================================
// Resets all progression, scoring, and adaptive tracking
    room = 1;
    bossHealth = 3;
    streak = 0;
    maxStreak = 0;
    totalAttempts = 0;
    correctAnswers = 0;
    bossPool = [];
    calcBag = [];
    conceptMemory = {};
    masteryState = { byTag: {}, byObjective: {}, recent: [] };
    tagHistory = [];
    lastTypes = [];
    adaptiveMode = "support";
    resetRemediationState();

    localStorage.removeItem("gauntletRoom");

    // National Engine artifact keys — keep these matched to your actual National Engine IDs.
    localStorage.removeItem("vaultIndex");
    localStorage.removeItem("vaultValve");
    localStorage.removeItem("vaultSeal");

    questionHistory = {
        easy: [], medium: [], hard: [], elite: [], calculation: [],
        easyBoss: [], mediumBoss: [], finalBoss: []
    };

    usedQuestions = {
        easy: [], medium: [], hard: [], elite: [],
        easyBoss: [], mediumBoss: [], finalBoss: []
    };
    
// =============================================
// UI INITIALIZATION — SAFE TO CUSTOMIZE
// =============================================
// Shows main game elements and restores vault visuals
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameBox").style.display = "block";
    document.getElementById("artifactVault").style.display = "block";
    document.querySelectorAll(".torch").forEach(t => t.style.display = "block");

   // =============================================
   // VAULT RESTORE SYSTEM — SAFE WITH MATCHING IDS
   // =============================================
   // IMPORTANT:
   // localStorage keys must match the HTML element ids.
   // =============================================    
    if(localStorage.getItem("vaultIndex")){
        document.getElementById("vaultIndex").classList.add("unlocked");
    }

    if(localStorage.getItem("vaultValve")){
        document.getElementById("vaultValve").classList.add("unlocked");
    }    

    if(localStorage.getItem("vaultSeal")){
        document.getElementById("vaultSeal").classList.add("unlocked");
    }
  
// Start game loop: music + timer + first question
    bgMusic.play().catch(e => console.log("Audio started"));
    startTime = Date.now(); 
    loadQuestion();
}

{id:4012,q:"The Strategist observes: 'All markets are connected.' Demand for electric vehicles rises, increasing demand for lithium. Lithium prices rise, battery supply falls, and laptop producers face higher costs. What does this show?",options:["Only the electric vehicle market is affected","A demand shock can create spillovers through shared input markets","Laptop demand must have increased first","Battery producers must be monopolists"],a:1,tag:"interaction",type:"integration",objective:"LO11.1",feedback:"Lithium is a shared input. A demand shock in one market can raise input prices and shift costs in related markets."},
{id:4013,q:"The Strategist presses: 'Production and consumption need not match.' In the trade graph, why can the economy produce at point A but consume at point C?",options:["Trade allows production and consumption to differ","The PPF shifts outward immediately","Point C is inside the PPF","The economy ignores opportunity cost"],a:0,tag:"interaction",type:"graph-integration",objective:"LO11.4",image:"trade11.2.png",feedback:"With trade, an economy can specialize in production and then exchange along the world price line. That allows consumption to differ from production."},
{id:4014,q:"The Strategist warns: 'Follow the whole chain.' A drought reduces wheat supply, bread prices rise, cereal producers face higher input costs, and some consumers switch toward rice. What does this chain show?",options:["Only supply shifts matter","One market disturbance can affect complements, substitutes, and input markets","Demand curves never shift after supply shocks","All prices must return to their original levels"],a:1,tag:"interaction",type:"multi-step",objective:"LO11.1",feedback:"A shock in one market can ripple through related goods, substitutes, complements, and input markets. That is the general-equilibrium logic."},

// --- EQUITY ---
{id:4015,q:"The Strategist concludes: 'Efficiency is not fairness.' An allocation is Pareto efficient but gives almost everything to one person. What is the correct conclusion?",options:["It must be socially optimal","It may be efficient but still fail society's fairness goals","It is not Pareto efficient because it is unequal","It proves markets always fail"],a:1,tag:"equity",type:"trap",objective:"LO11.5",feedback:"Pareto efficiency does not guarantee fairness. An allocation can be efficient because no mutually beneficial trades remain, while still being highly unequal."},
{id:4016,q:"The Strategist presses: 'Choose the tradeoff.' A policy redistributes income from high-income consumers to low-income consumers but reduces total surplus. What does this illustrate?",options:["A Pareto improvement","An efficiency-equity tradeoff","A public good problem","A monopoly pricing strategy"],a:1,tag:"equity",type:"interpretation",objective:"LO11.5",feedback:"The policy may improve fairness, but if it reduces total surplus, it creates an efficiency-equity tradeoff."},
{id:4017,q:"The Strategist delivers judgment: 'Build the fairer world carefully.' According to the Second Welfare Theorem, how can society pursue a fairer efficient outcome?",options:["Redistribute initial endowments, then allow competitive trade","Ban trade after redistribution","Force all consumers to hold equal bundles","Set every price equal to average cost"],a:0,tag:"equity",type:"integration",objective:"LO11.5",feedback:"The Second Welfare Theorem separates distribution from exchange: society can redistribute initial endowments, then allow competitive trade to reach an efficient allocation."}
],
   
easy:[
{id:1,q:"If the price of steel rises, what happens to the supply of cars?",options:["Increases","Decreases","Stays the same","Becomes zero"],a:1,tag:"interaction",type:"interpretation",objective:"LO11.1",feedback:"Higher input costs reduce supply."},
{id:2,q:"If wages increase, firms will typically...",options:["Increase supply","Decrease supply","Increase demand","Do nothing"],a:1,tag:"interaction",type:"interpretation",objective:"LO11.1",feedback:"Higher costs shift supply left."},
{id:3,q:"When one market affects another, this is called...",options:["Isolation","Interaction","Equilibrium","Efficiency"],a:1,tag:"interaction",type:"definition",objective:"LO11.1",feedback:"Markets are interconnected."},
{id:4,q:"If the price of coffee rises, demand for tea will likely...",options:["Fall","Rise","Stay the same","Disappear"],a:1,tag:"interaction",type:"interpretation",objective:"LO11.1",feedback:"Substitutes increase demand."},
{id:5,q:"A decrease in input costs will...",options:["Decrease supply","Increase supply","Decrease demand","Do nothing"],a:1,tag:"interaction",type:"interpretation",objective:"LO11.1",feedback:"Lower costs increase supply."},
{id:6,q:"If two goods are complements and one price rises, demand for the other...",options:["Rises","Falls","Stays constant","Becomes elastic"],a:1,tag:"interaction",type:"interpretation",objective:"LO11.1",feedback:"Complements move together."},

{id:7,q:"If demand increases in a competitive market, price will...",options:["Fall","Rise","Stay constant","Disappear"],a:1,tag:"efficiency",type:"interpretation",objective:"LO11.2",feedback:"Demand shifts push price up."},
{id:8,q:"If supply increases, price will...",options:["Rise","Fall","Stay constant","Double"],a:1,tag:"efficiency",type:"interpretation",objective:"LO11.2",feedback:"More supply lowers price."},
{id:9,q:"Allocative efficiency occurs when...",options:["MR = MC","P = MC","ATC is minimized","Profit is zero"],a:1,tag:"efficiency",type:"definition",objective:"LO11.2",feedback:"Value equals cost."},
{id:10,q:"Competitive markets tend to be efficient because...",options:["Firms control prices","P = MC","Government sets output","Supply is fixed"],a:1,tag:"efficiency",type:"interpretation",objective:"LO11.2",feedback:"Competition forces P = MC."},
{id:11,q:"Total surplus is maximized when...",options:["P = MC","MR = MC","ATC = MC","Demand is flat"],a:0,tag:"efficiency",type:"definition",objective:"LO11.2",feedback:"Efficiency maximizes total surplus."},
{id:12,q:"Consumer surplus measures...",options:["Profit","Willingness to pay minus price","Cost minus price","Revenue"],a:1,tag:"efficiency",type:"definition",objective:"LO11.2",feedback:"Value to buyers."},
{id:13,q:"Producer surplus measures...",options:["Price minus cost","Profit","Revenue","Demand"],a:0,tag:"efficiency",type:"definition",objective:"LO11.2",feedback:"Value to sellers."},

{id:14,q:"Market failure occurs when...",options:["Prices rise","Markets are inefficient","Firms earn profit","Demand shifts"],a:1,tag:"failure",type:"definition",objective:"LO11.3",feedback:"Failure = inefficiency."},
{id:15,q:"Externalities are...",options:["Internal costs","Costs or benefits affecting third parties","Prices","Demand shifts"],a:1,tag:"failure",type:"definition",objective:"LO11.3",feedback:"Spillovers outside the market."},
{id:16,q:"A negative externality causes...",options:["Too little production","Too much production","Efficient output","Zero output"],a:1,tag:"failure",type:"interpretation",objective:"LO11.3",feedback:"Overproduction problem."},
{id:17,q:"Deadweight loss represents...",options:["Lost surplus","Profit","Revenue","Cost"],a:0,tag:"failure",type:"definition",objective:"LO11.3",feedback:"Value lost from inefficiency."},

{id:18,q:"A monopolist is a firm that...",options:["Takes price","Controls price","Earns zero profit","Faces many competitors"],a:1,tag:"power",type:"definition",objective:"LO12.1",feedback:"Price maker."},
{id:19,q:"Monopolies restrict output to...",options:["Increase efficiency","Increase profits","Eliminate costs","Match competition"],a:1,tag:"power",type:"interpretation",objective:"LO12.3",feedback:"Less output, higher price."},
{id:20,q:"Compared to competition, monopoly price is...",options:["Lower","Higher","Equal","Zero"],a:1,tag:"power",type:"interpretation",objective:"LO12.3",feedback:"Market power raises price."},
{id:21,q:"Monopoly profit maximization occurs where...",options:["P = MC","MR = MC","ATC = MC","Demand is highest"],a:1,tag:"power",type:"definition",objective:"LO12.2",feedback:"Same rule, different outcome."},
{id:22,q:"A natural monopoly exists when...",options:["Many firms are efficient","One firm has lowest cost","Demand is low","Prices fall"],a:1,tag:"power",type:"definition",objective:"LO12.1",feedback:"Economies of scale dominate."},
{id:23,q:"Governments regulate monopolies to...",options:["Increase profits","Reduce inefficiency","Eliminate supply","Raise prices"],a:1,tag:"power",type:"interpretation",objective:"LO12.5",feedback:"Control market power."},

{id:24,q:"Cournot competition involves firms choosing...",options:["Prices","Output","Costs","Wages"],a:1,tag:"strategy",type:"definition",objective:"LO13.1",feedback:"Quantity competition."},
{id:25,q:"Bertrand competition involves firms choosing...",options:["Output","Prices","Capacity","Technology"],a:1,tag:"strategy",type:"definition",objective:"LO13.1",feedback:"Price competition."},
{id:26,q:"In Bertrand competition with identical goods, prices tend to...",options:["Rise","Fall to marginal cost","Stay high","Become random"],a:1,tag:"strategy",type:"interpretation",objective:"LO13.1",feedback:"Price war → P = MC."},
{id:27,q:"A first mover advantage means...",options:["Moving later is better","First firm gains advantage","No firm benefits","Prices fall"],a:1,tag:"strategy",type:"definition",objective:"LO13.3",feedback:"Commitment matters."},
{id:28,q:"Product differentiation gives firms...",options:["No power","Some market power","Perfect competition","Zero demand"],a:1,tag:"strategy",type:"interpretation",objective:"LO13.2",feedback:"Differentiation softens competition."},

{id:29,q:"Equity refers to...",options:["Efficiency","Fairness","Profit","Output"],a:1,tag:"equity",type:"definition",objective:"LO11.5",feedback:"Fair distribution."},
{id:30,q:"Efficiency refers to...",options:["Fairness","Maximizing total surplus","Equal income","Low prices"],a:1,tag:"equity",type:"definition",objective:"LO11.2",feedback:"Max total value."},
{id:31,q:"An efficiency-equity tradeoff means...",options:["Both always increase","Improving fairness may reduce efficiency","Efficiency always rises","Markets ignore fairness"],a:1,tag:"equity",type:"interpretation",objective:"LO11.5",feedback:"Tradeoffs are real."},
{id:32,q:"Redistribution policies aim to...",options:["Increase efficiency","Increase equity","Increase monopoly power","Reduce demand"],a:1,tag:"equity",type:"interpretation",objective:"LO11.5",feedback:"Shift toward fairness."},

{id:33,q:"In an Edgeworth Box, gains from trade exist when...",options:["MRS is equal","MRS differs between individuals","Prices are equal","Utility is maximized"],a:1,tag:"efficiency",type:"definition",objective:"LO11.4",feedback:"Different MRS → gains from trade."},
{id:34,q:"If two individuals have identical MRS, what does this imply?",options:["Gains from trade exist","Allocation is inefficient","No further gains from trade","Prices must change"],a:2,tag:"efficiency",type:"interpretation",objective:"LO11.4",feedback:"Equal MRS → Pareto efficient."},

{id:35,q:"A barrier to entry allows a firm to...",options:["Increase competition","Prevent new firms from entering","Reduce costs","Increase demand"],a:1,tag:"power",type:"definition",objective:"LO12.1",feedback:"Protects market power."},
{id:36,q:"Which is an example of a barrier to entry?",options:["Low prices","Patents","High demand","Perfect information"],a:1,tag:"power",type:"interpretation",objective:"LO12.1",feedback:"Legal barriers restrict entry."},
{id:37,q:"A firm charges an entry fee plus a per-unit price. This is called...",options:["Perfect competition","Two-part tariff","Price ceiling","Subsidy"],a:1,tag:"power",type:"definition",objective:"LO12.4",feedback:"Fixed fee + usage price."},
{id:38,q:"A two-part tariff allows firms to...",options:["Reduce output","Capture consumer surplus","Increase costs","Eliminate demand"],a:1,tag:"power",type:"interpretation",objective:"LO12.4",feedback:"Extracts surplus through entry fee."}
],

medium:[
{id:100,q:"Demand for electric cars rises. Lithium batteries are an input. What happens to lithium prices?",options:["Fall","Rise","Stay constant","Become zero"],a:1,tag:"interaction",type:"interpretation",objective:"LO11.1",feedback:"Derived demand increases input prices."},
{id:101,q:"If wages rise in one industry, what happens to wages in competing labor markets?",options:["Rise","Fall","Stay constant","Double"],a:1,tag:"interaction",type:"interpretation",objective:"LO11.1",feedback:"Labor shifts across markets—greater supply lowers wages elsewhere."},
{id:102,q:"If P > MC in a competitive market, what should happen?",options:["Output decreases","Output increases","Nothing changes","Firms exit"],a:1,tag:"efficiency",type:"interpretation",objective:"LO11.2",feedback:"Value exceeds cost—expand production."},
{id:103,q:"A market has P = 10 and MC = 6. What does this imply?",options:["Efficient","Underproduction","Overproduction","Cannot determine"],a:1,tag:"efficiency",type:"interpretation",objective:"LO11.2",feedback:"P > MC → underproduction."},
{id:104,q:"Two consumers have MRS of 2 and 6. What does this imply?",options:["Efficient allocation","No gains from trade","Gains from trade exist","Prices are equal"],a:2,tag:"efficiency",type:"interpretation",objective:"LO11.4",feedback:"Different valuations = gains from trade."},
{id:105,q:"A monopolist has MR = 20 and MC = 25. What should it do?",options:["Increase output","Decrease output","Keep output constant","Raise price"],a:1,tag:"power",type:"calculation",objective:"LO12.2",feedback:"MR < MC → reduce output."},
{id:106,q:"Why is monopoly price greater than marginal cost?",options:["Costs increase","Demand curve lies above MR","Demand is flat","Government forces it"],a:1,tag:"power",type:"interpretation",objective:"LO12.2",feedback:"Downward-sloping demand → MR < P."},
{id:107,q:"A monopolist perfectly price discriminates. What happens to output?",options:["Falls","Stays same","Rises to efficient level","Becomes zero"],a:2,tag:"power",type:"interpretation",objective:"LO12.4",feedback:"Perfect price discrimination eliminates DWL."},
{id:108,q:"In Cournot competition, if one firm increases output, rivals will...",options:["Increase output","Decrease output","Exit","Do nothing"],a:1,tag:"strategy",type:"interpretation",objective:"LO13.1",feedback:"Outputs are strategic substitutes."},
{id:109,q:"In Bertrand competition with identical goods and MC = 5, equilibrium price is...",options:["10","5","0","15"],a:1,tag:"strategy",type:"calculation",objective:"LO13.1",feedback:"Price competition drives P = MC."},
{id:110,q:"If firms become more differentiated, what happens to pricing?",options:["Falls to MC","Rises above MC","Becomes zero","Stays constant"],a:1,tag:"strategy",type:"interpretation",objective:"LO13.2",feedback:"Differentiation softens competition."},
{id:111,q:"An allocation is Pareto efficient. Can it still be unequal?",options:["No","Yes","Only with government","Only with monopoly"],a:1,tag:"equity",type:"interpretation",objective:"LO11.5",feedback:"Efficiency says nothing about fairness."},
{id:112,q:"Government redistributes income before trade. What happens?",options:["Always inefficient","Efficient outcome still possible","Markets fail","Prices collapse"],a:1,tag:"equity",type:"interpretation",objective:"LO11.5",feedback:"Second Welfare Theorem."},
{id:113,q:"A firm ignores pollution costs. What happens to output?",options:["Too low","Too high","Efficient","Zero"],a:1,tag:"failure",type:"interpretation",objective:"LO11.3",feedback:"External costs ignored → overproduction."},
{id:114,q:"A non-rival, non-excludable good leads to...",options:["Overproduction","Efficient provision","Underproduction","Zero demand"],a:2,tag:"failure",type:"interpretation",objective:"LO11.3",feedback:"Free-rider problem → underprovision."},
{id:115,q:"Information asymmetry leads to...",options:["Efficiency","Perfect competition","Market failure","Equilibrium"],a:2,tag:"failure",type:"definition",objective:"LO11.3",feedback:"Unequal information disrupts markets."},
{id:116,q:"If social cost exceeds private cost, output is...",options:["Too low","Too high","Efficient","Zero"],a:1,tag:"failure",type:"interpretation",objective:"LO11.3",feedback:"External costs → overproduction."},
{id:117,q:"Deadweight loss occurs when...",options:["All trades occur","Some beneficial trades are prevented","Prices equal MC","Supply equals demand"],a:1,tag:"failure",type:"interpretation",objective:"LO11.3",feedback:"Lost gains from trade."},
{id:118,q:"Where does a monopolist get price from?",options:["Supply","Demand","ATC","MC"],a:1,tag:"power",type:"interpretation",objective:"LO12.2",feedback:"Price comes from demand curve."},
{id:119,q:"Why is MR less than price for a monopolist?",options:["MR = P","Price cut applies to all units","MR > P","MR = 0"],a:1,tag:"power",type:"interpretation",objective:"LO12.2",feedback:"Lowering price affects all units sold."},
{id:120,q:"If P = 20 and MC = 10 under monopoly, output is...",options:["Efficient","Too low","Too high","Zero"],a:1,tag:"power",type:"interpretation",objective:"LO12.3",feedback:"P > MC → underproduction."},
{id:121,q:"A firm with falling ATC across output is...",options:["Perfect competition","Monopolistic competition","Natural monopoly","Oligopoly"],a:2,tag:"power",type:"definition",objective:"LO12.1",feedback:"Economies of scale dominate."},
{id:122,q:"Separating customers by willingness to pay is...",options:["Bundling","Price discrimination","Collusion","Regulation"],a:1,tag:"power",type:"definition",objective:"LO12.4",feedback:"Charging different prices to different groups."},
{id:123,q:"A firm charges a fixed fee plus per-unit price. This is...",options:["Market separation","Two-part tariff","Perfect competition","Limit pricing"],a:1,tag:"power",type:"definition",objective:"LO12.4",feedback:"Entry fee + usage price."},
{id:124,q:"In Cournot, output decisions are...",options:["Independent","Strategic","Random","Fixed"],a:1,tag:"strategy",type:"definition",objective:"LO13.1",feedback:"Firms react to each other."},
{id:125,q:"Cournot output relative to monopoly is...",options:["Lower","Higher","Equal","Zero"],a:1,tag:"strategy",type:"interpretation",objective:"LO13.1",feedback:"More competition → more output."},
{id:126,q:"Capacity constraints in Bertrand lead to prices...",options:["Equal to MC","Above MC","Zero","Random"],a:1,tag:"strategy",type:"interpretation",objective:"LO13.2",feedback:"Limits soften price competition."},
{id:127,q:"A Nash equilibrium occurs when...",options:["Firms cooperate","Each best responds","Prices identical","Output maximized"],a:1,tag:"strategy",type:"definition",objective:"LO13.1",feedback:"No incentive to deviate."},
{id:128,q:"First mover advantage exists because...",options:["Lower cost","Commitment shapes rival response","Better demand","Government support"],a:1,tag:"strategy",type:"interpretation",objective:"LO13.3",feedback:"Leader influences follower behavior."},
{id:129,q:"Collusion is harder with many firms because...",options:["More profit","Harder coordination","Lower demand","More efficiency"],a:1,tag:"strategy",type:"interpretation",objective:"LO13.1",feedback:"More firms = harder to coordinate."},
{id:130,q:"Pareto efficiency means...",options:["Equal income","No gains from trade","Max output","Stable prices"],a:1,tag:"efficiency",type:"definition",objective:"LO11.4",feedback:"No one can improve without harm."},
{id:131,q:"Moving to the contract curve means...",options:["Inefficiency","All gains realized","Lower output","Higher prices"],a:1,tag:"efficiency",type:"interpretation",objective:"LO11.4",feedback:"All mutually beneficial trades exhausted."},
{id:132,q:"Efficient allocation may be undesirable because...",options:["Too much output","Unequal distribution","High prices","Low cost"],a:1,tag:"equity",type:"interpretation",objective:"LO11.5",feedback:"Efficiency ignores fairness."},
{id:133,q:"Second Welfare Theorem suggests equity via...",options:["Price controls","Redistribution of endowments","Lower output","Eliminating markets"],a:1,tag:"equity",type:"interpretation",objective:"LO11.5",feedback:"Adjust starting point, then trade."},
{id:134,q:"Removing barriers to entry leads to...",options:["Higher prices","Prices toward MC","Lower output","Zero demand"],a:1,tag:"power",type:"interpretation",objective:"LO12.1",feedback:"Competition increases."},
{id:135,q:"A high entry fee + low price aims to...",options:["Reduce demand","Capture surplus","Raise costs","Eliminate competition"],a:1,tag:"power",type:"interpretation",objective:"LO12.4",feedback:"Two-part tariff extracts surplus."},
{id:136,q:"If usage price = MC under two-part tariff, output is...",options:["Too low","Too high","Efficient","Zero"],a:2,tag:"power",type:"interpretation",objective:"LO12.4",feedback:"Efficient quantity achieved."}
],

hard:[
{id:200,q:"A surge in demand for electric vehicles raises the price of lithium. Battery producers cut output, which then affects laptop production. What does this illustrate?",options:["A single-market adjustment only","General equilibrium spillovers across related markets","Monopoly pricing in batteries","A movement along the laptop demand curve"],a:1,tag:"interaction",type:"interpretation",objective:"LO 11.1 — Related market disturbances",feedback:"A shock in one market can cascade through related input and output markets."},
{id:201,q:"A new health study raises demand for tomatoes. Tomatoes and cucumbers are complements, and tomato farms hire more workers away from cucumber farms. What is the most likely long-run result?",options:["Tomato prices rise forever while cucumber prices never change","Tomato and cucumber markets both adjust as prices and wages change across markets","Only the tomato market changes because consumer demand began there","Worker wages are irrelevant because labor markets are separate"],a:1,tag:"interaction",type:"trap",objective:"LO 11.1 — Related market disturbances",feedback:"General equilibrium means product and labor markets adjust together."},
{id:202,q:"A tariff raises the domestic price of imported steel. Which downstream effect is most likely?",options:["Car supply shifts right because domestic firms gain certainty","Car supply shifts left because an input became more expensive","Car demand shifts right because steel is scarcer","Car prices must fall because steel producers earn more"],a:1,tag:"interaction",type:"interpretation",objective:"LO 11.1 — Related market disturbances",feedback:"Higher input costs reduce supply in industries using that input."},
{id:203,q:"Suppose coffee and pastries are complements. A productivity improvement lowers the cost of producing coffee. Which sequence is most plausible?",options:["Coffee supply rises, coffee price falls, demand for pastries rises","Coffee demand falls, pastry demand falls, both prices rise","Coffee price rises, pastry supply falls, labor exits both industries","Nothing happens outside the coffee market"],a:0,tag:"interaction",type:"default",objective:"LO 11.1 — Related market disturbances",feedback:"Lower coffee cost spills over into the complementary pastry market."},
{id:204,q:"An increase in demand for restaurant meals raises wages for cooks. Some workers leave retail jobs to become cooks. What happens first in retail labor markets?",options:["Retail labor supply falls, tending to raise retail wages","Retail labor supply rises, lowering retail wages","Retail output rises immediately because cooks consume more","Retail demand disappears because labor moved"],a:0,tag:"interaction",type:"trap",objective:"LO 11.1 — Related market disturbances",feedback:"Workers leaving retail reduce labor supply there, putting upward pressure on wages."},
{id:205,q:"Two industries use the same specialized chip. Demand for gaming consoles spikes, raising chip prices. A student says only console prices will change because laptops are a different market. What is wrong with that reasoning?",options:["Chip prices affect only consumers, not firms","Shared inputs link markets, so laptop production conditions also change","Laptop demand determines chip prices, not console demand","Different final goods can never be connected"],a:1,tag:"interaction",type:"trap",objective:"LO 11.1 — Related market disturbances",feedback:"Shared inputs are one of the clearest channels linking separate markets."},
{id:206,q:"If an economy moves from a point inside the PPF to a point on the PPF but not to the highest attainable indifference curve, what has improved?",options:["Allocative efficiency only","Technical efficiency only","Equity only","Nothing has improved"],a:1,tag:"efficiency",type:"interpretation",objective:"LO 11.2 — Competitive markets and efficiency",feedback:"Moving onto the PPF fixes waste in production, but not necessarily consumer satisfaction."},
{id:207,q:"At a candidate allocation, the slope of the PPF does not equal the slope of the indifference curve. What does that imply?",options:["Consumers and producers are perfectly aligned","The allocation is not allocatively efficient","The economy is inside the PPF","The market must be monopolized"],a:1,tag:"efficiency",type:"trap",objective:"LO 11.2 — Competitive markets and efficiency",feedback:"Efficiency requires opportunity cost to match willingness to trade."},
{id:208,q:"Two people trade goods until their MRS values are equal. What has been achieved?",options:["Equality of income","Pareto efficiency in exchange","Productive efficiency in production","A guarantee of fairness"],a:1,tag:"efficiency",type:"definition",objective:"LO 11.4 — Pareto efficiency",feedback:"Equal MRS means no mutually beneficial trade remains."},
{id:209,q:"A competitive market clears, but at the equilibrium output P exceeds MC. What should we conclude?",options:["The market is efficient because quantity demanded equals quantity supplied","The market is underproducing relative to the efficient level","The market is overproducing because firms earn profit","Nothing can be concluded without ATC"],a:1,tag:"efficiency",type:"trap",objective:"LO 11.2 — Competitive markets and efficiency",feedback:"Market clearing alone is not enough. Efficiency requires P = MC."},
{id:210,q:"A good has price 18 and marginal cost 12 at the current output. What adjustment would move the market toward allocative efficiency?",options:["Reduce output because costs are positive","Increase output because willingness to pay exceeds marginal cost","Hold output constant because the market already clears","Raise fixed costs so ATC matches price"],a:1,tag:"efficiency",type:"calculation",objective:"LO 11.2 — Competitive markets and efficiency",feedback:"If P > MC, additional units are worth more than they cost to make."},
{id:211,q:"A planner chooses a point on the PPF that yields less utility than another feasible point on the same PPF. This point is...",options:["Productively and allocatively efficient","Productively efficient but allocatively inefficient","Allocatively efficient but technically inefficient","Pareto superior to all other points"],a:1,tag:"efficiency",type:"trap",objective:"LO 11.2 — Competitive markets and efficiency",feedback:"Being on the PPF does not guarantee the best mix of goods."},
{id:212,q:"Trade moves an economy from an initial endowment to a point on the contract curve. What is true at the final point?",options:["At least one more mutually beneficial trade still exists","No one can be made better off without harming someone else","The allocation must also be equitable","Each person has the same bundle"],a:1,tag:"efficiency",type:"interpretation",objective:"LO 11.4 — Pareto efficiency",feedback:"The contract curve is the set of Pareto efficient allocations."},
{id:213,q:"A factory dumps waste into a river, and downstream fishers bear the damage. If the factory ignores that damage, which comparison is correct?",options:["Private cost equals social cost","Private cost exceeds social cost","Social cost exceeds private cost","Marginal benefit exceeds all costs automatically"],a:2,tag:"failure",type:"definition",objective:"LO 11.3 — Market failure",feedback:"Unpriced external harm means social cost is higher than private cost."},
{id:214,q:"A city installs streetlights funded voluntarily. Many residents enjoy the lights whether or not they contribute, so contributions stay low. What market failure is this?",options:["Imperfect competition","Public goods underprovision due to free-riding","Natural monopoly","Efficient market separation"],a:1,tag:"failure",type:"interpretation",objective:"LO 11.3 — Market failure",feedback:"Non-excludability and non-rivalry create free-rider problems."},
{id:215,q:"A student says a market with many buyers and sellers must be efficient. Which case most clearly disproves that claim?",options:["A perfectly competitive wheat market","A polluted river caused by factory output","A market with falling ATC","A firm entering because profits exist"],a:1,tag:"failure",type:"trap",objective:"LO 11.3 — Market failure",feedback:"Externalities can destroy efficiency even when competition exists."},
{id:216,q:"If consumers cannot tell whether used cars are high or low quality, mutually beneficial trades may fail to occur. This is best classified as...",options:["A public good problem","Imperfect information causing market failure","A natural monopoly problem","A case of allocative efficiency"],a:1,tag:"failure",type:"interpretation",objective:"LO 11.3 — Market failure",feedback:"Asymmetric information can block efficient exchange."},
{id:217,q:"Suppose the private marginal cost of a product is 8, but the external damage per unit is 5. What is the social marginal cost?",options:["3","8","13","40"],a:2,tag:"failure",type:"calculation",objective:"LO 11.3 — Market failure",feedback:"Social marginal cost adds the external harm to private cost."},
{id:218,q:"A vaccine provides private benefit to the buyer and external benefit to others by reducing spread. If consumers ignore that external benefit, the market outcome will likely involve...",options:["Too much output","Too little output","Efficient output","A natural monopoly"],a:1,tag:"failure",type:"trap",objective:"LO 11.3 — Market failure",feedback:"Positive externalities lead to underproduction relative to the social optimum."},
{id:219,q:"A monopolist faces demand P = 100 - Q and marginal cost MC = 20. At the profit-maximizing output, which condition must hold?",options:["P = MC","MR = MC","ATC = MC","Demand = supply"],a:1,tag:"power",type:"definition",objective:"LO 12.2 — Monopoly price and output",feedback:"The monopoly still maximizes profit where marginal revenue equals marginal cost."},
{id:220,q:"A monopolist has demand P = 100 - Q and MC = 20. Marginal revenue is MR = 100 - 2Q. What is the profit-maximizing quantity?",options:["20","40","60","80"],a:1,tag:"power",type:"calculation",objective:"LO 12.2 — Monopoly price and output",feedback:"Set MR = MC: 100 - 2Q = 20, so Q = 40."},
{id:221,q:"Using the previous monopoly setup with Q = 40, what price does the monopolist charge?",options:["20","40","60","80"],a:2,tag:"power",type:"calculation",objective:"LO 12.2 — Monopoly price and output",feedback:"Plug Q = 40 into demand: P = 100 - 40 = 60."},
{id:222,q:"A student argues monopoly is inefficient only when the monopolist earns positive profit. What is wrong with that claim?",options:["Monopoly is inefficient whenever P > MC, even if profit is zero or negative","Any firm with zero profit is efficient","Profits determine whether MR equals MC","Monopoly is efficient if fixed costs are high"],a:0,tag:"power",type:"trap",objective:"LO 12.3 — Problems with monopoly",feedback:"The inefficiency comes from output restriction, not from accounting profit alone."},
{id:223,q:"A monopolist can perfectly price discriminate. Compared with single-price monopoly, output will...",options:["Fall because each unit gets a different price","Stay the same because market power is unchanged","Rise to the efficient level where willingness to pay equals MC","Become lower than competitive output"],a:2,tag:"power",type:"interpretation",objective:"LO 12.4 — Monopoly pricing strategies",feedback:"Perfect price discrimination removes deadweight loss by expanding output."},
{id:224,q:"A movie theater charges students less than non-students for the same showing. For this to work as profit-maximizing price discrimination, the theater must be able to...",options:["Eliminate all fixed costs","Prevent resale and separate customer groups","Make demand perfectly elastic","Force both groups to buy the same quantity"],a:1,tag:"power",type:"interpretation",objective:"LO 12.4 — Monopoly pricing strategies",feedback:"Price discrimination requires segmentation and limited arbitrage."},
{id:225,q:"A utility company is regulated under marginal-cost pricing even though marginal cost is below average cost. What is the likely result?",options:["The firm earns excess profit","The firm incurs losses unless subsidized","The firm produces too little","The firm becomes perfectly competitive"],a:1,tag:"power",type:"trap",objective:"LO 12.5 — Natural monopoly regulation",feedback:"For a natural monopoly, P = MC can imply price below AC."},
{id:226,q:"A monopolist charges an entry fee plus a per-unit price equal to marginal cost. Why can this raise profit?",options:["It creates deadweight loss on purpose","It captures consumer surplus through the fixed fee while keeping usage high","It forces resale","It makes demand more elastic"],a:1,tag:"power",type:"trap",objective:"LO 12.4 — Monopoly pricing strategies",feedback:"Two-part pricing can mimic some gains from price discrimination."},
{id:227,q:"In a two-firm Cournot market, each firm chooses output knowing total output affects price. Why is the Cournot outcome not as restrictive as monopoly?",options:["Each firm ignores the effect of its output on the other firm’s profit","Each firm sets price equal to MC directly","Collusion is legally required","Demand becomes perfectly elastic"],a:0,tag:"strategy",type:"trap",objective:"LO 13.1 — Cournot and Bertrand behavior",feedback:"Each firm internalizes only part of the price effect, so total output exceeds monopoly output."},
{id:228,q:"In Bertrand competition with identical goods and constant MC, why does price tend to fall to marginal cost?",options:["Each firm can gain the whole market by slightly undercutting a higher rival price","Firms coordinate on the monopoly price","Consumers prefer the highest price","Output is fixed by assumption"],a:0,tag:"strategy",type:"interpretation",objective:"LO 13.1 — Cournot and Bertrand behavior",feedback:"Undercutting pressure drives price down until no profitable cut remains."},
{id:229,q:"Two Bertrand firms sell differentiated goods. One firm raises its price. What is the best-response logic for the rival?",options:["Also tends to raise price because some consumers shift toward it","Must cut price to zero immediately","Must exit because demand becomes negative","Faces no change in demand"],a:0,tag:"strategy",type:"interpretation",objective:"LO 13.2 — Capacity constraints and product differentiation",feedback:"Differentiation softens competition and makes upward-sloping best responses possible."},
{id:230,q:"A cartel agreement in a repeated game is easier to sustain when...",options:["There are many firms and little chance of future interaction","Firms are patient and expect the game to continue","Products are homogeneous and one-shot","Detection of cheating takes longer and firms are impatient"],a:1,tag:"strategy",type:"trap",objective:"LO 13.1 — Cournot and Bertrand behavior",feedback:"Patience and future punishment make collusion more stable."},
{id:231,q:"Suppose a grim-trigger collusive arrangement requires g ≥ 1/2 to deter cheating. If g = 0.4, what follows?",options:["Collusion is stable","Cheating is profitable, so collusion is not sustainable","Price must equal monopoly price forever","Cournot output becomes efficient"],a:1,tag:"strategy",type:"calculation",objective:"LO 13.1 — Cournot and Bertrand behavior",feedback:"If continuation is too unlikely, future punishment is too weak."},
{id:232,q:"In a Stackelberg model, the leader commits to output first. Why does the leader often earn more than the follower?",options:["The follower must match output exactly","The leader chooses output anticipating the follower’s best response","The leader faces a flatter demand curve","The follower is forced to price at MC"],a:1,tag:"strategy",type:"interpretation",objective:"LO 13.3 — First mover advantage",feedback:"Commitment gives the leader a strategic advantage."},
{id:233,q:"An incumbent threatens a low price to deter entry, but the low price can be reversed immediately after entry decisions are made. Why may this threat fail?",options:["Price is not a sunk commitment","Demand becomes perfectly inelastic","Entry never depends on expected future prices","Incumbents cannot lower prices"],a:0,tag:"strategy",type:"trap",objective:"LO 13.3 — First mover advantage",feedback:"Without commitment, limit pricing threats may not be credible."},
{id:234,q:"Two firms play Bertrand with MC = 12 and identical goods. If both charge 18, what profitable deviation exists for one firm?",options:["Raise price to 20","Lower price slightly below 18 to capture the market","Keep price unchanged because 18 is Nash","Set price below 12 permanently"],a:1,tag:"strategy",type:"trap",objective:"LO 13.1 — Cournot and Bertrand behavior",feedback:"Any price above MC invites undercutting in the homogeneous Bertrand model."},
{id:235,q:"An allocation on the contract curve gives one person much more than the other. Which statement is correct?",options:["It is inefficient because the bundles are unequal","It may be efficient even though it is inequitable","It must be both fair and efficient","It cannot result from voluntary trade"],a:1,tag:"equity",type:"trap",objective:"LO 11.5 — Efficiency and equity",feedback:"Pareto efficiency does not guarantee fairness."},
{id:236,q:"A social planner wants a fairer outcome without sacrificing the efficiency of competitive trade. According to the Second Welfare Theorem, the best general approach is to...",options:["Fix all market prices directly","Redistribute initial endowments, then allow competitive trade","Ban voluntary exchange","Require equal quantities of all goods"],a:1,tag:"equity",type:"interpretation",objective:"LO 11.5 — Efficiency and equity",feedback:"Separate distribution from the trading process itself."},
{id:237,q:"Suppose Smith would never voluntarily trade from his initial endowment to the planner’s preferred allocation, even though the planner views it as fair. What core problem does this illustrate?",options:["Efficiency automatically creates equity","Equity goals may require coercion or redistribution of endowments","Markets cannot reach the contract curve","All fair allocations are inefficient"],a:1,tag:"equity",type:"trap",objective:"LO 11.5 — Efficiency and equity",feedback:"Fairness often cannot be imposed through voluntary trade alone."},
